name: Build FrontStores

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            sig-artifact: sig-mac-aarch64
            sig-path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/FrontStores.app.tar.gz.sig
            update-url-suffix: FrontStores_aarch64.app.tar.gz
            update-platform: darwin-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            sig-artifact: sig-mac-x86_64
            sig-path: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/FrontStores.app.tar.gz.sig
            update-url-suffix: FrontStores_x64.app.tar.gz
            update-platform: darwin-x86_64
          - platform: windows-latest
            args: ''
            sig-artifact: sig-win-x86_64
            sig-path: ''
            update-url-suffix: ''
            update-platform: windows-x86_64
          - platform: ubuntu-22.04
            args: ''
            sig-artifact: ''
            sig-path: ''
            update-url-suffix: ''
            update-platform: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FrontStores ${{ github.ref_name }}'
          releaseBody: |
            ## FrontStores ${{ github.ref_name }}

            Complete business management software for Indian shops. 30-day free trial · ₹999/month.

            ---

            ### 🪟 Windows
            1. Download the `.msi` file below
            2. Double-click to install
            3. If SmartScreen shows a warning → click **More info** → **Run anyway**

            ### 🍎 Mac (Apple Silicon — M1/M2/M3/M4)
            Download `aarch64.dmg`

            ### 🍎 Mac (Intel)
            Download `x86_64.dmg`

            **Mac installation note:** macOS may show "App is damaged" — this is a security warning for apps not on the App Store. To fix:
            1. Copy FrontStores.app to your Applications folder
            2. Open Terminal and run:
            ```
            xattr -cr /Applications/FrontStores.app
            ```
            3. Double-click the app — done. You only need to do this once.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Find and copy the .sig file to a known location, then upload as artifact
      - name: Collect macOS signature
        if: matrix.platform == 'macos-latest'
        run: |
          SIG=$(find src-tauri/target -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$SIG" ]; then
            echo "Found sig: $SIG"
            cp "$SIG" update.sig
          else
            echo "No .sig file found"
            touch update.sig
          fi

      - name: Upload signature artifact (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sig-artifact }}
          path: update.sig
          if-no-files-found: warn

      - name: Find and upload Windows signature artifact
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem -Path "src-tauri/target" -Filter "*.sig" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sigFile) {
            Write-Host "Found sig: $($sigFile.FullName)"
            Copy-Item $sigFile.FullName -Destination "win-update.sig"
          } else {
            Write-Host "No .sig file found"
            New-Item -Path "win-update.sig" -ItemType File | Out-Null
          }

      - name: Upload Windows sig artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: sig-win-x86_64
          path: win-update.sig
          if-no-files-found: warn

  # Runs after all platform builds — creates and uploads latest.json for auto-update
  create-update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac aarch64 signature
        uses: actions/download-artifact@v4
        with:
          name: sig-mac-aarch64
          path: sigs/aarch64
        continue-on-error: true

      - name: Download Mac x86_64 signature
        uses: actions/download-artifact@v4
        with:
          name: sig-mac-x86_64
          path: sigs/x86_64
        continue-on-error: true

      - name: Download Windows signature
        uses: actions/download-artifact@v4
        with:
          name: sig-win-x86_64
          path: sigs/win
        continue-on-error: true

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/imrakeshsoni/frontstores/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          AARCH64_SIG=$(cat sigs/aarch64/*.sig 2>/dev/null || cat sigs/aarch64/FrontStores.app.tar.gz.sig 2>/dev/null || echo "")
          X86_64_SIG=$(cat sigs/x86_64/*.sig 2>/dev/null || cat sigs/x86_64/FrontStores.app.tar.gz.sig 2>/dev/null || echo "")

          PLATFORMS="{}"

          if [ -n "$AARCH64_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$AARCH64_SIG" \
              --arg url "${BASE}/FrontStores_aarch64.app.tar.gz" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          if [ -n "$X86_64_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$X86_64_SIG" \
              --arg url "${BASE}/FrontStores_x64.app.tar.gz" \
              '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi

          echo "$PLATFORMS" | jq \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "FrontStores $TAG — bug fixes and improvements" \
            '{"version": $version, "notes": $notes, "pub_date": $pub_date, "platforms": .}' \
            > latest.json

          cat latest.json

          gh release upload "${TAG}" latest.json \
            --repo imrakeshsoni/frontstores \
            --clobber
