name: Build FrontStores

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Create the GitHub Release once, before platform builds start ────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > notes.md << 'NOTES'
          Complete business management software for Indian shops. 30-day free trial · ₹999/month.

          ### Windows
          Download the .msi file and double-click to install.
          If SmartScreen shows a warning, click More info then Run anyway.

          ### Mac (Apple Silicon)
          Download the aarch64.dmg file.

          ### Mac (Intel)
          Download the x86_64.dmg file.

          Mac note: if macOS says "App is damaged", open Terminal and run:
          xattr -cr /Applications/FrontStores.app
          NOTES

          gh release create "$TAG" \
            --title "FrontStores $TAG" \
            --notes-file notes.md \
            --draft=false \
            --prerelease=false

  # ── Platform builds ─────────────────────────────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            arch: aarch64
            sig-artifact: sig-mac-aarch64

          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
            arch: x64
            sig-artifact: sig-mac-x86_64

          - platform: windows-latest
            args: ''
            target: ''
            arch: x64-win
            sig-artifact: sig-win-x86_64

          - platform: ubuntu-22.04
            args: ''
            target: ''
            arch: amd64-linux
            sig-artifact: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set app version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            c.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
          "
          echo "Version set to ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── macOS: create updater tar, sign it, upload DMG + tar, capture sig ──
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          APP_DIR="${BUNDLE_DIR}/macos"
          DMG=$(find "${BUNDLE_DIR}/dmg" -name "*.dmg" | head -1)

          echo "=== Files in bundle/macos ==="
          ls -la "${APP_DIR}/"

          # tauri build creates the .app but not the .tar.gz updater bundle.
          # Create and name it with the arch suffix so the URL in latest.json matches.
          TAR="${APP_DIR}/FrontStores_${ARCH}.app.tar.gz"
          SIG="${APP_DIR}/FrontStores_${ARCH}.app.tar.gz.sig"

          (cd "${APP_DIR}" && tar -czf "FrontStores_${ARCH}.app.tar.gz" FrontStores.app)
          echo "Created tar: $(du -h ${TAR} | cut -f1)"

          # Sign the arch-named file directly
          npx tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            "${TAR}" || true

          echo "=== After signing ==="
          ls -la "${APP_DIR}/"

          # Upload DMG and arch-named tar (filenames now match latest.json URLs)
          DMG_NAME="FrontStores_${ARCH}.dmg"
          cp "${DMG}" "${DMG_NAME}"
          gh release upload "$TAG" \
            "${DMG_NAME}" \
            "${TAR}" \
            --clobber

          # Capture the sig
          if [ -f "$SIG" ]; then
            cp "$SIG" update.sig
            echo "Sig captured: $(wc -c < update.sig) bytes"
          else
            echo "WARNING: sig not found — signing may have failed"
            touch update.sig
          fi

      - name: Upload macOS sig artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sig-artifact }}
          path: update.sig
          if-no-files-found: warn

      # ── Windows: sign NSIS manually (Tauri v2 doesn't auto-sign on Windows)
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          $nsis = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1

          if ($msi) { gh release upload $env:TAG "$($msi.FullName)#FrontStores_x64_en-US.msi" --clobber }
          if ($nsis) { gh release upload $env:TAG "$($nsis.FullName)#FrontStores_x64-setup.exe" --clobber }

          # Tauri v2 doesn't auto-sign on Windows — manually sign the NSIS exe
          if ($nsis) {
            Write-Host "Signing NSIS installer: $($nsis.FullName)"
            npx tauri signer sign --private-key $env:TAURI_SIGNING_PRIVATE_KEY $nsis.FullName
            $sigFile = "$($nsis.FullName).sig"
            if (Test-Path $sigFile) {
              Copy-Item $sigFile -Destination "update.sig"
              Write-Host "Win sig captured: $((Get-Item update.sig).Length) bytes"
            } else {
              Write-Host "WARNING: signing produced no .sig file"
              New-Item -Path "update.sig" -ItemType File -Force | Out-Null
            }
          } else {
            Write-Host "WARNING: No NSIS exe found to sign"
            New-Item -Path "update.sig" -ItemType File -Force | Out-Null
          }

      - name: Upload Windows sig artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: sig-win-x86_64
          path: update.sig
          if-no-files-found: warn

      # ── Linux: upload AppImage + deb + rpm ────────────────────────────────
      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          find src-tauri/target/release/bundle -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" | \
            xargs -I{} gh release upload "$TAG" {} --clobber

  # ── Consolidation: generate latest.json from captured sigs ─────────────────
  create-update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac aarch64 sig
        uses: actions/download-artifact@v4
        with:
          name: sig-mac-aarch64
          path: sigs/aarch64
        continue-on-error: true

      - name: Download Mac x86_64 sig
        uses: actions/download-artifact@v4
        with:
          name: sig-mac-x86_64
          path: sigs/x86_64
        continue-on-error: true

      - name: Download Windows sig
        uses: actions/download-artifact@v4
        with:
          name: sig-win-x86_64
          path: sigs/win
        continue-on-error: true

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/imrakeshsoni/frontstores/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== Sig file contents ==="
          find sigs -type f | xargs -I{} sh -c 'echo "--- {} ---"; wc -c {}'

          AARCH64_SIG=$(cat sigs/aarch64/update.sig 2>/dev/null || echo "")
          X86_64_SIG=$(cat sigs/x86_64/update.sig 2>/dev/null || echo "")
          WIN_SIG=$(cat sigs/win/update.sig 2>/dev/null || echo "")

          PLATFORMS="{}"

          if [ -n "$AARCH64_SIG" ] && [ $(echo -n "$AARCH64_SIG" | wc -c) -gt 10 ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$AARCH64_SIG" \
              --arg url "${BASE}/FrontStores_aarch64.app.tar.gz" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
            echo "Added darwin-aarch64"
          else
            echo "WARNING: aarch64 sig empty or missing"
          fi

          if [ -n "$X86_64_SIG" ] && [ $(echo -n "$X86_64_SIG" | wc -c) -gt 10 ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$X86_64_SIG" \
              --arg url "${BASE}/FrontStores_x64.app.tar.gz" \
              '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
            echo "Added darwin-x86_64"
          else
            echo "WARNING: x86_64 sig empty or missing"
          fi

          if [ -n "$WIN_SIG" ] && [ $(echo -n "$WIN_SIG" | wc -c) -gt 10 ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$WIN_SIG" \
              --arg url "${BASE}/FrontStores_x64-setup.exe" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
            echo "Added windows-x86_64"
          else
            echo "WARNING: windows sig empty or missing"
          fi

          echo "$PLATFORMS" | jq \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "FrontStores $TAG — bug fixes and improvements" \
            '{"version": $version, "notes": $notes, "pub_date": $pub_date, "platforms": .}' \
            > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "${TAG}" latest.json \
            --repo imrakeshsoni/frontstores \
            --clobber
