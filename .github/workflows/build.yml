name: Build FrontStores

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FrontStores ${{ github.ref_name }}'
          releaseBody: |
            ## FrontStores ${{ github.ref_name }}

            Complete business management software for Indian shops. 30-day free trial · ₹999/month.

            ---

            ### 🪟 Windows
            1. Download the `.msi` file below
            2. Double-click to install
            3. If SmartScreen shows a warning → click **More info** → **Run anyway**

            ### 🍎 Mac (Apple Silicon — M1/M2/M3/M4)
            Download `aarch64.dmg`

            ### 🍎 Mac (Intel)
            Download `x86_64.dmg`

            **Mac installation note:** macOS may show "App is damaged" — this is a security warning for apps not on the App Store. To fix:
            1. Copy FrontStores.app to your Applications folder
            2. Open Terminal and run:
            ```
            xattr -cr /Applications/FrontStores.app
            ```
            3. Double-click the app — done. You only need to do this once.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
