# [core] Quality gate — runs the money-flow + data-doctor tests and a type-check on every push
# to main and on PRs. A red run here means a release should NOT be cut.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test
