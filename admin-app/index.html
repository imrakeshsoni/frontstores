<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrontStores Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --surface: #0f1623; --surface2: #161e2e;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #f0f4ff; --muted: #6b7898; --accent: #4f8ef7;
      --green: #22c55e; --red: #ef4444; --gold: #f59e0b; --orange: #f97316;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(79,142,247,.15) 0%, transparent 70%); }
    .login-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 28px; padding: 48px; width: 380px; text-align: center; }
    .login-card h1 { font-size: 28px; font-weight: 900; letter-spacing: -.03em; margin-bottom: 6px; }
    .login-card h1 span { background: linear-gradient(135deg, #4f8ef7, #7c6af7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .login-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 12px; }
    .login-input:focus { border-color: var(--accent); }
    .login-btn { width: 100%; background: linear-gradient(135deg, #4f8ef7, #7c6af7); color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; }

    /* LAYOUT */
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-brand { font-size: 16px; font-weight: 800; }
    .topbar-brand span { background: linear-gradient(135deg, #4f8ef7, #7c6af7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-time { font-size: 13px; color: var(--muted); }
    .btn-icon { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }

    /* TABS */
    .tabs { display: flex; gap: 4px; padding: 0 28px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { padding: 14px 20px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; border-radius: 999px; min-width: 18px; height: 18px; padding: 0 5px; margin-left: 6px; }

    .main { flex: 1; overflow-y: auto; padding: 28px; }
    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px 22px; }
    .stat-card .label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 900; letter-spacing: -.03em; }

    /* SEARCH */
    .toolbar { margin-bottom: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-input { background: var(--surface); border: 1px solid var(--border2); color: var(--text); border-radius: 12px; padding: 10px 16px; font-size: 14px; outline: none; flex: 1; min-width: 200px; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 10px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.07); }

    /* TABLE */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 12px 20px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.025); }
    tbody tr.frozen-row { opacity: .55; }
    tbody tr.revoked-row { opacity: .35; }
    tbody td { padding: 14px 20px; font-size: 14px; vertical-align: middle; }
    .shop-name { font-weight: 700; }
    .shop-id { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
    .badge-active   { background: rgba(34,197,94,.1);  color: var(--green); border: 1px solid rgba(34,197,94,.2); }
    .badge-expiring { background: rgba(245,158,11,.1); color: #fcd34d;    border: 1px solid rgba(245,158,11,.2); }
    .badge-expired  { background: rgba(239,68,68,.1);  color: #fca5a5;    border: 1px solid rgba(239,68,68,.2); }
    .badge-frozen   { background: rgba(99,179,237,.1); color: #90cdf4;    border: 1px solid rgba(99,179,237,.2); }
    .badge-revoked  { background: rgba(239,68,68,.08); color: #fc8181;    border: 1px solid rgba(239,68,68,.15); }
    .badge-new      { background: rgba(79,142,247,.1); color: #93c5fd;    border: 1px solid rgba(79,142,247,.2); }
    .type-chip { font-size: 12px; background: var(--surface2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 999px; color: var(--muted); }
    .days-bar { width: 70px; height: 4px; background: var(--surface2); border-radius: 99px; margin-top: 5px; overflow: hidden; }
    .days-fill { height: 100%; border-radius: 99px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

    /* DETAIL PANEL */
    #panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; }
    #panel-overlay.open { display: block; }
    #detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: var(--surface); border-left: 1px solid var(--border2); padding: 0; overflow-y: auto; transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); z-index: 100; display: flex; flex-direction: column; }
    #detail-panel.open { transform: translateX(0); }
    .dp-header { padding: 24px 24px 20px; border-bottom: 1px solid var(--border); }
    .dp-close { float: right; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .dp-body { padding: 20px 24px; flex: 1; }
    .dp-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
    .dp-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .dp-value { font-size: 14px; color: var(--text); margin-bottom: 12px; word-break: break-all; }
    .dp-actions { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    .action-btn { width: 100%; border: none; border-radius: 14px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .action-btn:hover { opacity: .88; }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-extend-big { background: linear-gradient(135deg, var(--green), #16a34a); color: #fff; }
    .btn-freeze { background: rgba(99,179,237,.12); border: 1px solid rgba(99,179,237,.25) !important; color: #90cdf4; }
    .btn-unfreeze { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2) !important; color: var(--green); }
    .btn-revoke { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2) !important; color: #fca5a5; }
    .contact-row { display: flex; gap: 8px; }
    .contact-btn { flex: 1; border: 1px solid var(--border2); border-radius: 12px; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--surface2); color: var(--muted); text-decoration: none; transition: all .15s; }
    .contact-btn:hover { background: var(--border2); color: var(--text); }
    .contact-btn.wa { border-color: rgba(34,197,94,.3); color: var(--green); background: rgba(34,197,94,.07); }

    /* ERRORS */
    .errors-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .error-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; }
    .error-card.resolved { opacity: .4; }
    .error-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .error-shop { font-weight: 700; font-size: 14px; }
    .error-time { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .error-msg { font-size: 13px; color: #fca5a5; font-family: monospace; background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.1); padding: 8px 12px; border-radius: 8px; word-break: break-word; }
    .error-stack { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 8px; white-space: pre-wrap; word-break: break-word; display: none; background: var(--surface2); padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
    .error-stack.open { display: block; }
    .error-btns { display: flex; gap: 8px; margin-top: 10px; }
    .btn-sm { padding: 5px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); }
    .btn-sm:hover { color: var(--text); }
    .btn-sm-green { border-color: rgba(34,197,94,.2); color: var(--green); background: rgba(34,197,94,.07); }
    .btn-sm-green:hover { background: rgba(34,197,94,.14); }

    /* TOAST */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Front<span>Stores</span></h1>
    <p>Admin Dashboard · Rakesh Soni</p>
    <input class="login-input" type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Front<span>Stores</span> <span style="color:var(--muted);font-weight:400;font-size:13px">Admin</span></div>
    <div class="topbar-right">
      <span class="topbar-time" id="clock"></span>
      <button class="btn-icon" onclick="loadAll()">↻ Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-customers" onclick="switchTab('customers')">Customers</div>
    <div class="tab" id="tab-errors" onclick="switchTab('errors')">
      Errors <span class="tab-badge" id="error-badge" style="display:none">0</span>
    </div>
  </div>

  <div class="main">

    <!-- CUSTOMERS -->
    <div class="tab-page active" id="page-customers">
      <div class="stats-row">
        <div class="stat-card"><div class="label">Total</div><div class="value" id="s-total" style="color:var(--accent)">—</div></div>
        <div class="stat-card"><div class="label">Active</div><div class="value" id="s-active" style="color:var(--green)">—</div></div>
        <div class="stat-card"><div class="label">Expiring 7d</div><div class="value" id="s-expiring" style="color:var(--gold)">—</div></div>
        <div class="stat-card"><div class="label">Expired</div><div class="value" id="s-expired" style="color:var(--red)">—</div></div>
        <div class="stat-card"><div class="label">Frozen / Revoked</div><div class="value" id="s-blocked" style="color:var(--muted)">—</div></div>
      </div>

      <div class="toolbar">
        <input class="search-input" id="search" placeholder="Search by shop name, owner or ID…" oninput="renderCustomers()" />
        <button class="filter-btn active" id="f-all"      onclick="setFilter('all')">All</button>
        <button class="filter-btn"        id="f-active"   onclick="setFilter('active')">Active</button>
        <button class="filter-btn"        id="f-expiring" onclick="setFilter('expiring')">Expiring</button>
        <button class="filter-btn"        id="f-expired"  onclick="setFilter('expired')">Expired</button>
        <button class="filter-btn"        id="f-frozen"   onclick="setFilter('frozen')">Frozen</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Shop</th><th>Type</th><th>Contact</th><th>Joined</th><th>Subscription</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ERRORS -->
    <div class="tab-page" id="page-errors">
      <div class="errors-toolbar">
        <input class="search-input" id="err-search" placeholder="Search errors…" oninput="renderErrors()" style="max-width:300px" />
        <button class="filter-btn active" id="ef-all"      onclick="setEFilter('all')">All</button>
        <button class="filter-btn"        id="ef-open"     onclick="setEFilter('open')">Open</button>
        <button class="filter-btn"        id="ef-resolved" onclick="setEFilter('resolved')">Resolved</button>
      </div>
      <div id="errors-list"></div>
    </div>

  </div>
</div>

<!-- Detail panel -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="detail-panel">
  <div class="dp-header">
    <button class="dp-close" onclick="closePanel()">✕</button>
    <div id="dp-title" style="font-size:18px;font-weight:800;margin-bottom:4px"></div>
    <div id="dp-sub" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
  </div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-actions" id="dp-actions"></div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:3001';
const ICONS = { medical:'💊', grocery:'🛒', restaurant:'🍽️', vehicle:'🚗', retail:'🏪', stocks:'📈' };
let password = '', allCustomers = [], allErrors = [], filter = 'all', eFilter = 'all', openId = null;

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}, 1000);

function switchTab(t) {
  ['customers','errors'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
    document.getElementById('page-'+x).classList.toggle('active', x===t);
  });
}

function login() {
  const p = document.getElementById('pwd-input').value;
  if (!p) return;
  password = p;
  document.getElementById('login-error').textContent = '';
  loadAll(true);
}

async function api(path, opts={}) {
  return fetch(API+path, { ...opts, headers: { 'Authorization': `Basic ${btoa(':'+password)}`, 'Content-Type':'application/json', ...(opts.headers||{}) } });
}

async function loadAll(isLogin=false) {
  try {
    const [cr, er] = await Promise.all([api('/admin/api/customers'), api('/admin/api/errors')]);
    if (cr.status === 401) { if (isLogin) document.getElementById('login-error').textContent = 'Wrong password'; return; }
    allCustomers = await cr.json();
    allErrors = await er.json();
    if (isLogin) { document.getElementById('login-screen').style.display='none'; document.getElementById('app').classList.add('visible'); }
    updateStats(); renderCustomers(); renderErrors(); updateBadge();
    // Refresh open panel
    if (openId) { const c = allCustomers.find(x=>x.tenant_id===openId); if (c) renderPanel(c); }
  } catch(e) { if (isLogin) document.getElementById('login-error').textContent = 'Cannot connect. Is server running?'; }
}

function daysLeft(exp) { return exp ? Math.ceil((new Date(exp)-Date.now())/(864e5)) : 0; }
function subStatus(c) {
  if (c.account_status === 'frozen') return 'frozen';
  if (c.account_status === 'revoked') return 'revoked';
  const d = daysLeft(c.expires_at);
  if (d > 7) return 'active';
  if (d > 0) return 'expiring';
  return 'expired';
}

function updateStats() {
  document.getElementById('s-total').textContent   = allCustomers.length;
  document.getElementById('s-active').textContent  = allCustomers.filter(c=>subStatus(c)==='active').length;
  document.getElementById('s-expiring').textContent= allCustomers.filter(c=>subStatus(c)==='expiring').length;
  document.getElementById('s-expired').textContent = allCustomers.filter(c=>subStatus(c)==='expired').length;
  document.getElementById('s-blocked').textContent = allCustomers.filter(c=>['frozen','revoked'].includes(subStatus(c))).length;
}
function updateBadge() {
  const n = allErrors.filter(e=>!e.resolved).length;
  const b = document.getElementById('error-badge');
  b.textContent = n; b.style.display = n>0?'inline-flex':'none';
}

function setFilter(f) {
  filter = f;
  ['all','active','expiring','expired','frozen'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',x===f));
  renderCustomers();
}

function renderCustomers() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = allCustomers.filter(c => {
    const st = subStatus(c);
    if (filter !== 'all' && st !== filter) return false;
    if (!q) return true;
    return (c.shop_name||'').toLowerCase().includes(q)||(c.owner_name||'').toLowerCase().includes(q)||(c.tenant_id||'').toLowerCase().includes(q);
  });

  const tbody = document.getElementById('tbody');
  if (!list.length) { tbody.innerHTML=`<tr><td colspan="5"><div class="empty">No customers found</div></td></tr>`; return; }

  tbody.innerHTML = list.map(c => {
    const st = subStatus(c);
    const d = daysLeft(c.expires_at);
    const icon = ICONS[c.shop_type]||'🏪';
    const reg = c.registered_at ? new Date(c.registered_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

    let badge, bar='';
    if (st==='active')   { badge=`<span class="badge badge-active">✓ ${d}d left</span>`; bar=`<div class="days-bar"><div class="days-fill" style="width:${Math.min(100,(d/30)*100)}%;background:var(--green)"></div></div>`; }
    else if (st==='expiring') { badge=`<span class="badge badge-expiring">⚠ ${d}d left</span>`; bar=`<div class="days-bar"><div class="days-fill" style="width:${Math.min(100,(d/30)*100)}%;background:var(--gold)"></div></div>`; }
    else if (st==='expired')  { badge=`<span class="badge badge-expired">✕ Expired</span>`; }
    else if (st==='frozen')   { badge=`<span class="badge badge-frozen">🧊 Frozen</span>`; }
    else if (st==='revoked')  { badge=`<span class="badge badge-revoked">🚫 Revoked</span>`; }

    const rowClass = st==='frozen'?'frozen-row':st==='revoked'?'revoked-row':'';
    return `<tr class="${rowClass}" onclick="openPanel('${c.tenant_id}')">
      <td><div class="shop-name">${c.shop_name||'Unknown'}</div><div class="shop-id">${(c.tenant_id||'').substring(0,20)}…</div></td>
      <td><span class="type-chip">${icon} ${c.shop_type||'—'}</span></td>
      <td><div style="font-size:13px">${c.owner_name||'—'}</div><div style="font-size:12px;color:var(--muted)">${c.phone||c.email||'—'}</div></td>
      <td style="color:var(--muted);font-size:13px">${reg}</td>
      <td>${badge}${bar}</td>
    </tr>`;
  }).join('');
}

function openPanel(id) {
  openId = id;
  const c = allCustomers.find(x=>x.tenant_id===id);
  if (!c) return;
  renderPanel(c);
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}

function renderPanel(c) {
  const st = subStatus(c);
  const d = daysLeft(c.expires_at);
  const icon = ICONS[c.shop_type]||'🏪';
  const errs = allErrors.filter(e=>e.tenant_id===c.tenant_id&&!e.resolved).length;

  let statusBadge;
  if (st==='active')   statusBadge=`<span class="badge badge-active">✓ Active · ${d} days left</span>`;
  else if (st==='expiring') statusBadge=`<span class="badge badge-expiring">⚠ Expiring · ${d} days left</span>`;
  else if (st==='expired')  statusBadge=`<span class="badge badge-expired">✕ Expired</span>`;
  else if (st==='frozen')   statusBadge=`<span class="badge badge-frozen">🧊 Frozen</span>`;
  else if (st==='revoked')  statusBadge=`<span class="badge badge-revoked">🚫 Revoked</span>`;

  document.getElementById('dp-title').textContent = c.shop_name||'Unknown';
  document.getElementById('dp-sub').innerHTML = `${icon} ${c.shop_type||'—'} ${errs>0?`<span style="color:var(--red);margin-left:8px">⚠ ${errs} open error${errs>1?'s':''}</span>`:''}`;

  document.getElementById('dp-body').innerHTML = `
    <div style="margin-bottom:16px">${statusBadge}</div>

    <div class="dp-label">Owner</div><div class="dp-value">${c.owner_name||'—'}</div>
    <div class="dp-label">Phone</div><div class="dp-value">${c.phone||'—'}</div>
    <div class="dp-label">Email</div><div class="dp-value">${c.email||'—'}</div>
    <div class="dp-label">City</div><div class="dp-value">${c.city||'—'}</div>
    ${c.gstin?`<div class="dp-label">GSTIN</div><div class="dp-value">${c.gstin}</div>`:''}

    <div class="dp-section">
      <div class="dp-label">Shop ID</div><div class="dp-value" style="font-family:monospace;font-size:12px">${c.tenant_id}</div>
      <div class="dp-label">Registered</div><div class="dp-value">${c.registered_at?new Date(c.registered_at).toLocaleString('en-IN'):'—'}</div>
      <div class="dp-label">Expires</div><div class="dp-value">${c.expires_at||'—'}</div>
    </div>

    <div class="dp-section">
      <div class="contact-row">
        ${c.phone?`<a href="https://wa.me/91${c.phone.replace(/[^0-9]/g,'')}?text=Hi ${encodeURIComponent(c.owner_name||'')}, your FrontStores subscription is activated!" class="contact-btn wa">💬 WhatsApp</a>`:''}
        ${c.email?`<a href="mailto:${c.email}?subject=FrontStores Subscription" class="contact-btn">📧 Email</a>`:''}
      </div>
    </div>
  `;

  // Action buttons depend on current status
  const isFrozen = st === 'frozen';
  const isRevoked = st === 'revoked';
  document.getElementById('dp-actions').innerHTML = `
    <button class="action-btn btn-extend-big" onclick="doAction('${c.tenant_id}','extend')" ${isRevoked?'disabled':''}>
      ➕ Extend 30 Days
    </button>
    ${isFrozen
      ? `<button class="action-btn btn-unfreeze" onclick="doAction('${c.tenant_id}','unfreeze')">✅ Unfreeze Account</button>`
      : `<button class="action-btn btn-freeze" onclick="doAction('${c.tenant_id}','freeze')" ${isRevoked?'disabled':''}>🧊 Freeze Account</button>`
    }
    ${!isRevoked
      ? `<button class="action-btn btn-revoke" onclick="confirmRevoke('${c.tenant_id}','${(c.shop_name||'').replace(/'/g,"\\'")}')">🚫 Revoke Access</button>`
      : `<button class="action-btn btn-unfreeze" onclick="doAction('${c.tenant_id}','unfreeze')">↩ Restore Access</button>`
    }
  `;
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  openId = null;
}

async function doAction(id, action) {
  const c = allCustomers.find(x=>x.tenant_id===id);
  const msgs = { extend:'Extended 30 days', freeze:'Account frozen', unfreeze:'Account unfrozen' };
  await api(`/admin/api/customers/${id}/${action}`, { method:'POST' });
  showToast(`✅ ${msgs[action]} — ${c?.shop_name||id.substring(0,8)}`);
  await loadAll();
}

function confirmRevoke(id, name) {
  if (!confirm(`Revoke access for "${name}"?\n\nTheir app will be locked immediately. This can be reversed by clicking "Restore Access".`)) return;
  doAction(id, 'revoke');
}

// ERRORS
function setEFilter(f) {
  eFilter = f;
  ['all','open','resolved'].forEach(x=>document.getElementById('ef-'+x).classList.toggle('active',x===f));
  renderErrors();
}

function renderErrors() {
  const q = document.getElementById('err-search').value.toLowerCase();
  let list = allErrors.filter(e=>{
    if (eFilter==='open' && e.resolved) return false;
    if (eFilter==='resolved' && !e.resolved) return false;
    if (q && !(e.message||'').toLowerCase().includes(q) && !(e.shop_name||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('errors-list');
  if (!list.length) { el.innerHTML=`<div class="empty">No errors. Looking good ✓</div>`; return; }
  el.innerHTML = list.map(e=>{
    const icon = ICONS[e.shop_type]||'🏪';
    const t = new Date(e.received_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const hasStack = e.stack && e.stack.trim();
    return `<div class="error-card ${e.resolved?'resolved':''}">
      <div class="error-top">
        <div><span class="error-shop">${icon} ${e.shop_name||'Unknown'}</span>${e.app_version?` <span style="font-size:11px;color:var(--muted)">v${e.app_version}</span>`:''}</div>
        <div class="error-time">${t}</div>
      </div>
      <div class="error-msg">${escHtml(e.message)}</div>
      ${hasStack?`<div class="error-stack" id="stack-${e.id}">${escHtml(e.stack)}</div>`:''}
      <div class="error-btns">
        ${!e.resolved?`<button class="btn-sm btn-sm-green" onclick="resolveErr('${e.id}')">✓ Resolve</button>`:`<span style="font-size:12px;color:var(--muted)">✓ Resolved</span>`}
        ${hasStack?`<button class="btn-sm" onclick="toggleStack('${e.id}')">Stack trace</button>`:''}
        <button class="btn-sm" onclick="openPanel('${e.tenant_id}')">View shop</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleStack(id) { document.getElementById('stack-'+id)?.classList.toggle('open'); }
async function resolveErr(id) {
  await api(`/admin/api/errors/${id}/resolve`, { method:'POST' });
  const e = allErrors.find(x=>x.id===id);
  if (e) e.resolved = true;
  renderErrors(); updateBadge();
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.background=err?'var(--red)':'var(--green)';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

setInterval(()=>{ if (password) loadAll(); }, 30000);
</script>
</body>
