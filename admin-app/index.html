<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrontStores Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2ff;
      --surface: rgba(255,255,255,0.85);
      --surface2: rgba(255,255,255,0.6);
      --surface3: rgba(245,246,255,0.9);
      --border: rgba(99,102,241,0.12);
      --border2: rgba(99,102,241,0.22);
      --text: #1e1b4b;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --gold: #f59e0b;
      --orange: #f97316;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(99,102,241,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,.14) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 32px;
      padding: 52px;
      width: 400px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(99,102,241,.18), 0 0 0 1px rgba(255,255,255,.8) inset;
    }
    .login-logo { width: 56px; height: 56px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(99,102,241,.4); }
    .login-card h1 { font-size: 26px; font-weight: 900; letter-spacing: -.04em; color: #1e1b4b; margin-bottom: 6px; }
    .login-card h1 span { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .login-input {
      width: 100%; background: rgba(248,248,255,.9); border: 1.5px solid rgba(99,102,241,.2);
      border-radius: 14px; padding: 13px 16px; color: var(--text); font-size: 15px; font-family: inherit;
      outline: none; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s;
    }
    .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none;
      border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; letter-spacing: -.01em;
      box-shadow: 0 4px 16px rgba(99,102,241,.4); transition: transform .1s, box-shadow .2s;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,.45); }
    .login-btn:active { transform: translateY(0); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; }

    /* LAYOUT */
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    .topbar {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(99,102,241,.08), 0 4px 16px rgba(99,102,241,.06);
    }
    .topbar-brand { font-size: 17px; font-weight: 900; letter-spacing: -.03em; color: #1e1b4b; }
    .topbar-brand span { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-time { font-size: 13px; color: var(--muted); background: rgba(99,102,241,.07); padding: 5px 12px; border-radius: 8px; }
    .btn-icon {
      background: rgba(255,255,255,.8); border: 1px solid var(--border2); color: var(--muted);
      padding: 7px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .btn-icon:hover { color: var(--accent); border-color: var(--accent); background: rgba(99,102,241,.06); }

    /* TABS */
    .tabs {
      display: flex; gap: 2px; padding: 0 28px;
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 14px 22px; font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2.5px solid transparent; transition: all .15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
      border-radius: 999px; min-width: 18px; height: 18px; padding: 0 5px; margin-left: 6px;
      box-shadow: 0 2px 6px rgba(239,68,68,.4);
    }

    .main { flex: 1; overflow-y: auto; padding: 28px; }
    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 22px;
      box-shadow: 0 2px 12px rgba(99,102,241,.07);
      transition: transform .15s, box-shadow .15s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,.12); }
    .stat-card .label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px;
    }
    .stat-card .value { font-size: 34px; font-weight: 900; letter-spacing: -.04em; }

    /* SEARCH */
    .toolbar { margin-bottom: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-input {
      background: rgba(255,255,255,.9); border: 1.5px solid var(--border2); color: var(--text);
      border-radius: 12px; padding: 10px 16px; font-size: 14px; font-family: inherit;
      outline: none; flex: 1; min-width: 200px; transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 8px rgba(99,102,241,.06);
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .search-input::placeholder { color: #a5b4c8; }
    .filter-btn {
      background: rgba(255,255,255,.8); border: 1.5px solid rgba(99,102,241,.15); color: var(--muted);
      padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; font-family: inherit; transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(99,102,241,.08);
      box-shadow: 0 2px 8px rgba(99,102,241,.15);
    }

    /* TABLE */
    .table-wrap {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(99,102,241,.08);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 13px 20px; font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; text-align: left; border-bottom: 1px solid var(--border);
      font-weight: 700; background: rgba(248,248,255,.8);
    }
    tbody tr { border-bottom: 1px solid rgba(99,102,241,.07); cursor: pointer; transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(99,102,241,.04); }
    tbody tr.frozen-row { opacity: .6; }
    tbody tr.revoked-row { opacity: .4; }
    tbody td { padding: 15px 20px; font-size: 14px; vertical-align: middle; }
    .shop-name { font-weight: 700; color: #1e1b4b; }
    .shop-id { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 999px;
    }
    .badge-active   { background: rgba(16,185,129,.12); color: #059669; border: 1px solid rgba(16,185,129,.25); }
    .badge-expiring { background: rgba(245,158,11,.1);  color: #d97706;  border: 1px solid rgba(245,158,11,.25); }
    .badge-expired  { background: rgba(239,68,68,.1);   color: #dc2626;  border: 1px solid rgba(239,68,68,.25); }
    .badge-frozen   { background: rgba(99,179,237,.12); color: #2563eb;  border: 1px solid rgba(99,179,237,.3); }
    .badge-revoked  { background: rgba(239,68,68,.08);  color: #dc2626;  border: 1px solid rgba(239,68,68,.2); }
    .badge-new      { background: rgba(99,102,241,.1);  color: var(--accent); border: 1px solid rgba(99,102,241,.2); }
    .type-chip { font-size: 12px; background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.15); padding: 3px 10px; border-radius: 999px; color: var(--accent); font-weight: 600; }
    .days-bar { width: 72px; height: 5px; background: rgba(99,102,241,.1); border-radius: 99px; margin-top: 5px; overflow: hidden; }
    .days-fill { height: 100%; border-radius: 99px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

    /* DETAIL PANEL */
    #panel-overlay { display: none; position: fixed; inset: 0; background: rgba(30,27,75,.25); backdrop-filter: blur(4px); z-index: 90; }
    #panel-overlay.open { display: block; }
    #detail-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 440px;
      background: rgba(252,252,255,.97);
      backdrop-filter: blur(24px);
      border-left: 1px solid var(--border2);
      padding: 0; overflow-y: auto;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      z-index: 100; display: flex; flex-direction: column;
      box-shadow: -8px 0 40px rgba(99,102,241,.15);
    }
    #detail-panel.open { transform: translateX(0); }
    .dp-header {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(99,102,241,.06), rgba(139,92,246,.04));
    }
    .dp-close {
      float: right; background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.15);
      color: var(--muted); width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .dp-close:hover { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.2); color: var(--red); }
    .dp-body { padding: 20px 24px; flex: 1; }
    .dp-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
    .dp-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; font-weight: 600; }
    .dp-value { font-size: 14px; color: var(--text); margin-bottom: 12px; word-break: break-all; font-weight: 500; }
    .dp-actions { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; background: rgba(248,248,255,.8); }
    .action-btn {
      width: 100%; border: none; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: transform .1s, opacity .15s, box-shadow .2s; font-family: inherit;
    }
    .action-btn:hover { transform: translateY(-1px); opacity: .94; }
    .action-btn:active { transform: translateY(0); }
    .action-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .btn-extend-big {
      background: linear-gradient(135deg, #10b981, #059669); color: #fff;
      box-shadow: 0 4px 14px rgba(16,185,129,.35);
    }
    .btn-freeze { background: rgba(99,179,237,.1); border: 1.5px solid rgba(99,179,237,.3) !important; color: #2563eb; }
    .btn-unfreeze { background: rgba(16,185,129,.1); border: 1.5px solid rgba(16,185,129,.25) !important; color: #059669; }
    .btn-revoke { background: rgba(239,68,68,.08); border: 1.5px solid rgba(239,68,68,.2) !important; color: #dc2626; }
    .contact-row { display: flex; gap: 8px; }
    .contact-btn {
      flex: 1; border: 1.5px solid var(--border2); border-radius: 12px; padding: 10px;
      text-align: center; font-size: 13px; font-weight: 600; cursor: pointer;
      background: rgba(255,255,255,.8); color: var(--muted); text-decoration: none; transition: all .15s;
    }
    .contact-btn:hover { background: rgba(99,102,241,.06); color: var(--accent); border-color: rgba(99,102,241,.3); }
    .contact-btn.wa { border-color: rgba(16,185,129,.3); color: #059669; background: rgba(16,185,129,.06); }
    .contact-btn.wa:hover { background: rgba(16,185,129,.12); }

    /* ERRORS & CONTACTS */
    .errors-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .error-card {
      background: rgba(255,255,255,.88); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px; margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(99,102,241,.06);
      transition: box-shadow .15s;
    }
    .error-card:hover { box-shadow: 0 4px 16px rgba(99,102,241,.1); }
    .error-card.resolved { opacity: .45; }
    .error-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .error-shop { font-weight: 700; font-size: 14px; color: #1e1b4b; }
    .error-time { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .error-msg {
      font-size: 13px; color: #dc2626; font-family: monospace;
      background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.15);
      padding: 10px 14px; border-radius: 10px; word-break: break-word;
    }
    .error-stack {
      font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 8px;
      white-space: pre-wrap; word-break: break-word; display: none;
      background: rgba(248,248,255,.9); padding: 12px; border-radius: 10px;
      max-height: 200px; overflow-y: auto; border: 1px solid var(--border);
    }
    .error-stack.open { display: block; }
    .error-btns { display: flex; gap: 8px; margin-top: 12px; }
    .btn-sm {
      padding: 6px 14px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border2); background: rgba(255,255,255,.8); color: var(--muted);
      font-family: inherit; transition: all .15s;
    }
    .btn-sm:hover { color: var(--accent); border-color: rgba(99,102,241,.3); }
    .btn-sm-green { border-color: rgba(16,185,129,.25); color: #059669; background: rgba(16,185,129,.06); }
    .btn-sm-green:hover { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.4); }

    /* TOAST */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #10b981, #059669); color: #fff;
      padding: 13px 26px; border-radius: 14px; font-size: 14px; font-weight: 700;
      opacity: 0; transition: opacity .22s, transform .22s;
      pointer-events: none; z-index: 200;
      box-shadow: 0 8px 24px rgba(16,185,129,.4);
    }
    #toast.show { opacity: 1; }

    /* CODE MODAL */
    #code-modal-overlay {
      position: fixed; inset: 0; background: rgba(30,27,75,.35); backdrop-filter: blur(6px);
      z-index: 300; display: none; align-items: center; justify-content: center;
    }
    #code-modal-overlay.open { display: flex; }
    #code-modal {
      background: rgba(252,252,255,.97); border: 1px solid var(--border2);
      border-radius: 24px; padding: 36px; width: 360px; text-align: center;
      box-shadow: 0 24px 64px rgba(99,102,241,.2);
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏪</div>
    <h1>Front<span>Stores</span></h1>
    <p>Admin Dashboard · Rakesh Soni</p>
    <input class="login-input" type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Front<span>Stores</span> <span style="color:var(--muted);font-weight:400;font-size:13px">Admin</span></div>
    <div class="topbar-right">
      <span class="topbar-time" id="clock"></span>
      <button class="btn-icon" onclick="loadAll()">↻ Refresh</button>
      <button class="btn-icon" onclick="logout()" style="color:var(--red);border-color:rgba(239,68,68,.3)">⎋ Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-customers" onclick="switchTab('customers')">
      Customers <span class="tab-badge" id="pending-badge" style="display:none;background:#7c3aed">0</span>
    </div>
    <div class="tab" id="tab-contacts" onclick="switchTab('contacts')">
      Contacts <span class="tab-badge" id="contact-badge" style="display:none">0</span>
    </div>
    <div class="tab" id="tab-errors" onclick="switchTab('errors')">
      Errors <span class="tab-badge" id="error-badge" style="display:none">0</span>
    </div>
  </div>

  <div class="main">

    <!-- CUSTOMERS -->
    <div class="tab-page active" id="page-customers">
      <div class="stats-row">
        <div class="stat-card"><div class="label">Total</div><div class="value" id="s-total" style="color:var(--accent)">—</div></div>
        <div class="stat-card"><div class="label">Pending</div><div class="value" id="s-pending" style="color:#a78bfa">—</div></div>
        <div class="stat-card"><div class="label">Active</div><div class="value" id="s-active" style="color:var(--green)">—</div></div>
        <div class="stat-card"><div class="label">Expiring 7d</div><div class="value" id="s-expiring" style="color:var(--gold)">—</div></div>
        <div class="stat-card"><div class="label">Expired</div><div class="value" id="s-expired" style="color:var(--red)">—</div></div>
        <div class="stat-card"><div class="label">Frozen / Revoked</div><div class="value" id="s-blocked" style="color:var(--muted)">—</div></div>
      </div>

      <div class="toolbar">
        <input class="search-input" id="search" placeholder="Search by shop name, owner or ID…" oninput="renderCustomers()" />
        <button class="filter-btn active" id="f-all"      onclick="setFilter('all')">All</button>
        <button class="filter-btn"        id="f-pending"  onclick="setFilter('pending')">⏳ Pending</button>
        <button class="filter-btn"        id="f-active"   onclick="setFilter('active')">Active</button>
        <button class="filter-btn"        id="f-expiring" onclick="setFilter('expiring')">Expiring</button>
        <button class="filter-btn"        id="f-expired"  onclick="setFilter('expired')">Expired</button>
        <button class="filter-btn"        id="f-frozen"   onclick="setFilter('frozen')">Frozen</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Shop</th><th>Type</th><th>Contact</th><th>Joined</th><th>Subscription</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- CONTACTS -->
    <div class="tab-page" id="page-contacts">
      <div class="errors-toolbar">
        <input class="search-input" id="con-search" placeholder="Search contacts…" oninput="renderContacts()" style="max-width:300px" />
        <button class="filter-btn active" id="cf-all"      onclick="setCFilter('all')">All</button>
        <button class="filter-btn"        id="cf-open"     onclick="setCFilter('open')">Open</button>
        <button class="filter-btn"        id="cf-resolved" onclick="setCFilter('resolved')">Resolved</button>
      </div>
      <div id="contacts-list"></div>
    </div>

    <!-- ERRORS -->
    <div class="tab-page" id="page-errors">
      <div class="errors-toolbar">
        <input class="search-input" id="err-search" placeholder="Search errors…" oninput="renderErrors()" style="max-width:300px" />
        <button class="filter-btn active" id="ef-all"      onclick="setEFilter('all')">All</button>
        <button class="filter-btn"        id="ef-open"     onclick="setEFilter('open')">Open</button>
        <button class="filter-btn"        id="ef-resolved" onclick="setEFilter('resolved')">Resolved</button>
      </div>
      <div id="errors-list"></div>
    </div>

  </div>
</div>

<!-- Detail panel -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="detail-panel">
  <div class="dp-header">
    <button class="dp-close" onclick="closePanel()">✕</button>
    <div id="dp-title" style="font-size:18px;font-weight:800;margin-bottom:4px"></div>
    <div id="dp-sub" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
  </div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-actions" id="dp-actions"></div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:3002';
const ICONS = { medical:'💊', restaurant:'🍽️' };
const CSRF_TOKEN = window.__CSRF_TOKEN__ || '';
let password = '', allCustomers = [], allErrors = [], allContacts = [], filter = 'all', eFilter = 'all', cFilter = 'all', openId = null;

// ── Security helpers ─────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeId(s) { return String(s||'').replace(/[^a-zA-Z0-9\-_]/g,''); }

// ── Idle session timeout (30 minutes) ────────────────────────────────────────
let _idleTimer = null;
function resetIdleTimer() {
  clearTimeout(_idleTimer);
  if (!password) return;
  _idleTimer = setTimeout(() => { logout(); showToast('Session expired due to inactivity', true); }, 30 * 60 * 1000);
}
['click','keydown','mousemove','touchstart'].forEach(e => document.addEventListener(e, resetIdleTimer, {passive:true}));

function logout() {
  password = '';
  allCustomers = []; allErrors = []; openId = null;
  clearTimeout(_idleTimer);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='';
  document.getElementById('pwd-input').value='';
  closePanel();
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}, 1000);

function switchTab(t) {
  ['customers','contacts','errors'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
    document.getElementById('page-'+x).classList.toggle('active', x===t);
  });
}

function login() {
  const p = document.getElementById('pwd-input').value;
  if (!p) return;
  password = p;
  document.getElementById('login-error').textContent = '';
  loadAll(true);
}

async function api(path, opts={}) {
  return fetch(API+path, {
    ...opts,
    headers: {
      'Authorization': `Basic ${btoa(':'+password)}`,
      'Content-Type': 'application/json',
      'X-CSRF-Token': CSRF_TOKEN,
      ...(opts.headers||{})
    }
  });
}

async function loadAll(isLogin=false) {
  try {
    const [cr, er, conr] = await Promise.all([
      api('/admin/api/customers'),
      api('/admin/api/errors'),
      api('/admin/api/contacts'),
    ]);
    if (cr.status === 401) { if (isLogin) document.getElementById('login-error').textContent = 'Wrong password'; return; }
    allCustomers = await cr.json();
    allErrors    = await er.json();
    allContacts  = await conr.json();
    if (isLogin) { document.getElementById('login-screen').style.display='none'; document.getElementById('app').classList.add('visible'); resetIdleTimer(); }
    updateStats(); renderCustomers(); renderErrors(); renderContacts(); updateBadge();
    if (openId) { const c = allCustomers.find(x=>x.tenant_id===openId); if (c) renderPanel(c); }
  } catch(e) { if (isLogin) document.getElementById('login-error').textContent = 'Cannot connect. Is server running?'; }
}

function daysLeft(exp) { return exp ? Math.ceil((new Date(exp)-Date.now())/(864e5)) : 0; }
function subStatus(c) {
  if (c.account_status === 'pending') return 'pending';
  if (c.account_status === 'frozen') return 'frozen';
  if (c.account_status === 'revoked') return 'revoked';
  const d = daysLeft(c.expires_at);
  if (d > 7) return 'active';
  if (d > 0) return 'expiring';
  return 'expired';
}

function updateStats() {
  document.getElementById('s-total').textContent   = allCustomers.length;
  document.getElementById('s-pending').textContent = allCustomers.filter(c=>subStatus(c)==='pending').length;
  document.getElementById('s-active').textContent  = allCustomers.filter(c=>subStatus(c)==='active').length;
  document.getElementById('s-expiring').textContent= allCustomers.filter(c=>subStatus(c)==='expiring').length;
  document.getElementById('s-expired').textContent = allCustomers.filter(c=>subStatus(c)==='expired').length;
  document.getElementById('s-blocked').textContent = allCustomers.filter(c=>['frozen','revoked'].includes(subStatus(c))).length;
}
function updateBadge() {
  const ne = allErrors.filter(e=>!e.resolved).length;
  const be = document.getElementById('error-badge');
  be.textContent = ne; be.style.display = ne>0?'inline-flex':'none';
  const nc = allContacts.filter(c=>!c.resolved).length;
  const bc = document.getElementById('contact-badge');
  bc.textContent = nc; bc.style.display = nc>0?'inline-flex':'none';
  const np = allCustomers.filter(c=>subStatus(c)==='pending').length;
  const bp = document.getElementById('pending-badge');
  bp.textContent = np; bp.style.display = np>0?'inline-flex':'none';
}

function setFilter(f) {
  filter = f;
  ['all','pending','active','expiring','expired','frozen'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',x===f));
  renderCustomers();
}

function renderCustomers() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = allCustomers.filter(c => {
    const st = subStatus(c);
    if (filter !== 'all' && st !== filter) return false;
    if (!q) return true;
    return (c.shop_name||'').toLowerCase().includes(q)||(c.owner_name||'').toLowerCase().includes(q)||(c.tenant_id||'').toLowerCase().includes(q);
  });

  const tbody = document.getElementById('tbody');
  if (!list.length) { tbody.innerHTML=`<tr><td colspan="5"><div class="empty">No customers found</div></td></tr>`; return; }

  tbody.innerHTML = list.map(c => {
    const st = subStatus(c);
    const d = daysLeft(c.expires_at);
    const icon = ICONS[c.shop_type]||'🏪';
    const reg = c.registered_at ? new Date(c.registered_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

    let badge, bar='';
    if (st==='pending')  { badge=`<span class="badge" style="background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)">⏳ Pending Approval</span>`; }
    else if (st==='active')   { badge=`<span class="badge badge-active">✓ ${d}d left</span>`; bar=`<div class="days-bar"><div class="days-fill" style="width:${Math.min(100,(d/30)*100)}%;background:var(--green)"></div></div>`; }
    else if (st==='expiring') { badge=`<span class="badge badge-expiring">⚠ ${d}d left</span>`; bar=`<div class="days-bar"><div class="days-fill" style="width:${Math.min(100,(d/30)*100)}%;background:var(--gold)"></div></div>`; }
    else if (st==='expired')  { badge=`<span class="badge badge-expired">✕ Expired</span>`; }
    else if (st==='frozen')   { badge=`<span class="badge badge-frozen">🧊 Frozen</span>`; }
    else if (st==='revoked')  { badge=`<span class="badge badge-revoked">🚫 Revoked</span>`; }

    const rowClass = st==='frozen'?'frozen-row':st==='revoked'?'revoked-row':'';
    const tid = escHtml(c.tenant_id||'');
    return `<tr class="${rowClass}" onclick="openPanel('${tid}')">
      <td><div class="shop-name">${escHtml(c.shop_name||'Unknown')}</div><div class="shop-id">${tid.substring(0,20)}…</div></td>
      <td><span class="type-chip">${icon} ${escHtml(c.shop_type||'—')}</span></td>
      <td><div style="font-size:13px">${escHtml(c.owner_name||'—')}</div><div style="font-size:12px;color:var(--muted)">${escHtml(c.phone||c.email||'—')}</div></td>
      <td style="color:var(--muted);font-size:13px">${reg}</td>
      <td>${badge}${bar}</td>
    </tr>`;
  }).join('');
}

function openPanel(id) {
  openId = id;
  const c = allCustomers.find(x=>x.tenant_id===id);
  if (!c) return;
  renderPanel(c);
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}

function renderPanel(c) {
  const st = subStatus(c);
  const d = daysLeft(c.expires_at);
  const icon = ICONS[c.shop_type]||'🏪';
  const errs = allErrors.filter(e=>e.tenant_id===c.tenant_id&&!e.resolved).length;

  let statusBadge;
  if (st==='pending')  statusBadge=`<span class="badge" style="background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)">⏳ Pending Approval</span>`;
  else if (st==='active')   statusBadge=`<span class="badge badge-active">✓ Active · ${d} days left</span>`;
  else if (st==='expiring') statusBadge=`<span class="badge badge-expiring">⚠ Expiring · ${d} days left</span>`;
  else if (st==='expired')  statusBadge=`<span class="badge badge-expired">✕ Expired</span>`;
  else if (st==='frozen')   statusBadge=`<span class="badge badge-frozen">🧊 Frozen</span>`;
  else if (st==='revoked')  statusBadge=`<span class="badge badge-revoked">🚫 Revoked</span>`;

  document.getElementById('dp-title').textContent = c.shop_name||'Unknown';
  document.getElementById('dp-sub').innerHTML = `${icon} ${escHtml(c.shop_type||'—')} ${errs>0?`<span style="color:var(--red);margin-left:8px">⚠ ${errs} open error${errs>1?'s':''}</span>`:''}`;

  document.getElementById('dp-body').innerHTML = `
    <div style="margin-bottom:16px">${statusBadge}</div>

    <div class="dp-label">Owner</div><div class="dp-value">${escHtml(c.owner_name||'—')}</div>
    <div class="dp-label">Phone</div><div class="dp-value">${escHtml(c.phone||'—')}</div>
    <div class="dp-label">Email</div><div class="dp-value">${escHtml(c.email||'—')}</div>
    <div class="dp-label">City</div><div class="dp-value">${escHtml(c.city||'—')}</div>
    ${c.gstin?`<div class="dp-label">GSTIN</div><div class="dp-value">${escHtml(c.gstin)}</div>`:''}

    <div class="dp-section">
      <div class="dp-label">Shop ID</div><div class="dp-value" style="font-family:monospace;font-size:12px">${escHtml(c.tenant_id)}</div>
      <div class="dp-label">Registered</div><div class="dp-value">${c.registered_at?new Date(c.registered_at).toLocaleString('en-IN'):'—'}</div>
      <div class="dp-label">Expires</div><div class="dp-value">${escHtml(c.expires_at||'—')}</div>
    </div>

    <div class="dp-section">
      <div class="contact-row">
        ${c.phone?`<a href="https://wa.me/91${encodeURIComponent(c.phone.replace(/[^0-9]/g,''))}?text=Hi+${encodeURIComponent(c.owner_name||'')},+your+FrontStores+subscription+is+activated!" class="contact-btn wa">💬 WhatsApp</a>`:''}
        ${c.email?`<a href="mailto:${encodeURIComponent(c.email)}?subject=FrontStores+Subscription" class="contact-btn">📧 Email</a>`:''}
      </div>
    </div>
  `;

  // Action buttons depend on current status
  const isPending = st === 'pending';
  const isFrozen = st === 'frozen';
  const isRevoked = st === 'revoked';
  const hasResetReq = !!c.reset_requested_at && !c.reset_token;
  const hasResetCode = !!c.reset_token;
  const hasUnlockReq = !!c.unlock_requested_at && !c.unlock_token;
  const hasUnlockCode = !!c.unlock_token;
  const tid = escHtml(c.tenant_id||'');
  document.getElementById('dp-actions').innerHTML = `
    ${isPending ? `<button class="action-btn" style="background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.4);color:#c4b5fd;font-size:15px;padding:14px" onclick="doAction('${tid}','approve')">
      ✅ Approve & Start 30-Day Trial
    </button><div style="border-top:1px solid var(--border2);margin:8px 0"></div>` : ''}
    <button class="action-btn btn-extend-big" onclick="doAction('${tid}','extend')" ${isRevoked?'disabled':''}>
      ➕ Extend 30 Days
    </button>
    ${isFrozen
      ? `<button class="action-btn btn-unfreeze" onclick="doAction('${tid}','unfreeze')">✅ Unfreeze Account</button>`
      : `<button class="action-btn btn-freeze" onclick="doAction('${tid}','freeze')" ${isRevoked?'disabled':''}>🧊 Freeze Account</button>`
    }
    ${!isRevoked
      ? `<button class="action-btn btn-revoke" onclick="confirmRevoke('${tid}')">🚫 Revoke Access</button>`
      : `<button class="action-btn btn-unfreeze" onclick="doAction('${tid}','unfreeze')">↩ Restore Access</button>`
    }

    <div style="border-top:1px solid var(--border2);margin:8px 0"></div>

    ${hasUnlockCode
      ? `<div style="background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:12px;padding:14px;text-align:center">
           <div style="font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:4px">🔓 Unlock code is active</div>
           <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Code was shown when generated. Share it with the customer.</div>
           <button class="action-btn" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;padding:8px" onclick="clearUnlockCode('${tid}')">✕ Clear Code</button>
         </div>`
      : hasUnlockReq
        ? `<button class="action-btn" style="background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25);color:#93c5fd" onclick="generateUnlockCode('${tid}')">
             🔓 Generate Unlock Code <span style="font-size:11px;display:block;font-weight:400;margin-top:2px;color:var(--muted)">Requested ${new Date(c.unlock_requested_at).toLocaleString('en-IN')}</span>
           </button>`
        : `<button class="action-btn" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted)" onclick="generateUnlockCode('${tid}')">
             🔓 Unlock Account (too many attempts)
           </button>`
    }

    <div style="border-top:1px solid var(--border2);margin:4px 0"></div>

    ${hasResetCode
      ? `<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:14px;text-align:center">
           <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px">🔑 Reset code is active</div>
           <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Code was shown when generated. Share it with the customer.</div>
           <button class="action-btn" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;padding:8px" onclick="clearResetCode('${tid}')">✕ Clear Code</button>
         </div>`
      : hasResetReq
        ? `<button class="action-btn" style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:#fcd34d" onclick="generateResetCode('${tid}')">
             🔑 Generate Reset Code <span style="font-size:11px;display:block;font-weight:400;margin-top:2px">Reset requested ${new Date(c.reset_requested_at).toLocaleString('en-IN')}</span>
           </button>`
        : `<button class="action-btn" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted)" onclick="generateResetCode('${tid}')">
             🔑 Generate Password Reset Code
           </button>`
    }
  `;
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  openId = null;
}

async function doAction(id, action) {
  const c = allCustomers.find(x=>x.tenant_id===id);
  const msgs = { extend:'Extended 30 days', freeze:'Account frozen', unfreeze:'Account unfrozen' };
  await api(`/admin/api/customers/${id}/${action}`, { method:'POST' });
  showToast(`✅ ${msgs[action]} — ${c?.shop_name||id.substring(0,8)}`);
  await loadAll();
}

function confirmRevoke(id) {
  const c = allCustomers.find(x=>x.tenant_id===id);
  const name = c?.shop_name || id.substring(0,8);
  if (!confirm(`Revoke access for "${name}"?\n\nTheir app will be locked immediately. This can be reversed by clicking "Restore Access".`)) return;
  doAction(id, 'revoke');
}

function showCodeModal(title, code) {
  const old = document.getElementById('code-modal');
  if (old) old.remove();
  const m = document.createElement('div');
  m.id = 'code-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center';
  m.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:340px;text-align:center">
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${escHtml(title)}</div>
    <div style="font-size:40px;font-weight:900;letter-spacing:10px;color:var(--accent);font-family:monospace">${escHtml(code)}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">Share this with the customer.<br>This code will <strong>not</strong> be shown again.</div>
    <button onclick="document.getElementById('code-modal').remove()" style="margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer">Done ✓</button>
  </div>`;
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
  document.body.appendChild(m);
}

async function generateResetCode(id) {
  const code = String(Math.floor(100000 + Math.random() * 900000));
  const expires = new Date(Date.now() + 24*60*60*1000).toISOString();
  const r = await api(`/admin/api/customers/${id}/set-reset-code`, {
    method: 'POST',
    body: JSON.stringify({ code, expires })
  });
  if (r.ok) {
    showCodeModal('🔑 Password Reset Code (valid 24 hours)', code);
    await loadAll();
  } else {
    showToast('Failed to generate reset code', true);
  }
}

async function clearResetCode(id) {
  await api(`/admin/api/customers/${id}/set-reset-code`, {
    method: 'POST',
    body: JSON.stringify({ code: null, expires: null })
  });
  showToast('Reset code cleared');
  await loadAll();
}

async function generateUnlockCode(id) {
  const code = String(Math.floor(100000 + Math.random() * 900000));
  const expires = new Date(Date.now() + 2*60*60*1000).toISOString();
  const r = await api(`/admin/api/customers/${id}/set-unlock-code`, {
    method: 'POST',
    body: JSON.stringify({ code, expires })
  });
  if (r.ok) {
    showCodeModal('🔓 Unlock Code (valid 2 hours)', code);
    await loadAll();
  } else {
    showToast('Failed to generate unlock code', true);
  }
}

async function clearUnlockCode(id) {
  await api(`/admin/api/customers/${id}/set-unlock-code`, {
    method: 'POST',
    body: JSON.stringify({ code: null, expires: null })
  });
  showToast('Unlock code cleared');
  await loadAll();
}

// CONTACTS
function setCFilter(f) {
  cFilter = f;
  ['all','open','resolved'].forEach(x=>document.getElementById('cf-'+x).classList.toggle('active',x===f));
  renderContacts();
}

function renderContacts() {
  const q = (document.getElementById('con-search')?.value||'').toLowerCase();
  let list = allContacts.filter(c=>{
    if (cFilter==='open' && c.resolved) return false;
    if (cFilter==='resolved' && !c.resolved) return false;
    if (q && !(c.name||'').toLowerCase().includes(q) && !(c.mobile||'').includes(q) && !(c.email||'').toLowerCase().includes(q) && !(c.shop_type||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('contacts-list');
  if (!list.length) { el.innerHTML=`<div class="empty">No contact inquiries yet.</div>`; return; }
  el.innerHTML = list.map(c=>{
    const t = new Date(c.received_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const cid = escHtml(c.id);
    return `<div class="error-card ${c.resolved?'resolved':''}">
      <div class="error-top">
        <div>
          <span class="error-shop">${escHtml(c.name||'Unknown')}</span>
          ${c.shop_type?` <span class="type-chip" style="font-size:11px">${escHtml(c.shop_type)}</span>`:''}
        </div>
        <div class="error-time">${t}</div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin:8px 0;font-size:13px">
        <span>📱 <a href="tel:${escHtml(c.mobile)}" style="color:#93c5fd">${escHtml(c.mobile)}</a></span>
        <span>📧 <a href="mailto:${escHtml(c.email)}" style="color:#93c5fd">${escHtml(c.email)}</a></span>
      </div>
      ${c.message?`<div class="error-msg" style="color:#e2e8f0">${escHtml(c.message)}</div>`:''}
      <div class="error-btns">
        ${!c.resolved
          ? `<button class="btn-sm btn-sm-green" onclick="resolveContact('${cid}')">✓ Mark Done</button>`
          : `<span style="font-size:12px;color:var(--muted)">✓ Resolved</span>`}
        ${c.mobile?`<a href="https://wa.me/91${escHtml(c.mobile.replace(/\D/g,''))}" target="_blank" class="btn-sm" style="border-color:rgba(34,197,94,.2);color:var(--green)">💬 WhatsApp</a>`:''}
        ${c.email?`<a href="mailto:${escHtml(c.email)}" class="btn-sm">📧 Email</a>`:''}
      </div>
    </div>`;
  }).join('');
}

async function resolveContact(id) {
  await api(`/admin/api/contacts/${id}/resolve`, { method:'POST' });
  const c = allContacts.find(x=>x.id===id);
  if (c) c.resolved = true;
  renderContacts(); updateBadge();
}

// ERRORS
function setEFilter(f) {
  eFilter = f;
  ['all','open','resolved'].forEach(x=>document.getElementById('ef-'+x).classList.toggle('active',x===f));
  renderErrors();
}

function renderErrors() {
  const q = document.getElementById('err-search').value.toLowerCase();
  let list = allErrors.filter(e=>{
    if (eFilter==='open' && e.resolved) return false;
    if (eFilter==='resolved' && !e.resolved) return false;
    if (q && !(e.message||'').toLowerCase().includes(q) && !(e.shop_name||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('errors-list');
  if (!list.length) { el.innerHTML=`<div class="empty">No errors. Looking good ✓</div>`; return; }
  el.innerHTML = list.map(e=>{
    const icon = ICONS[e.shop_type]||'🏪';
    const t = new Date(e.received_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const hasStack = e.stack && e.stack.trim();
    return `<div class="error-card ${e.resolved?'resolved':''}">
      <div class="error-top">
        <div><span class="error-shop">${icon} ${escHtml(e.shop_name||'Unknown')}</span>${e.app_version?` <span style="font-size:11px;color:var(--muted)">v${escHtml(e.app_version)}</span>`:''}</div>
        <div class="error-time">${t}</div>
      </div>
      <div class="error-msg">${escHtml(e.message)}</div>
      ${hasStack?`<div class="error-stack" id="stack-${e.id}">${escHtml(e.stack)}</div>`:''}
      <div class="error-btns">
        ${!e.resolved?`<button class="btn-sm btn-sm-green" onclick="resolveErr('${e.id}')">✓ Resolve</button>`:`<span style="font-size:12px;color:var(--muted)">✓ Resolved</span>`}
        ${hasStack?`<button class="btn-sm" onclick="toggleStack('${e.id}')">Stack trace</button>`:''}
        <button class="btn-sm" onclick="openPanel('${e.tenant_id}')">View shop</button>
      </div>
    </div>`;
  }).join('');
}

function toggleStack(id) { document.getElementById('stack-'+id)?.classList.toggle('open'); }
async function resolveErr(id) {
  await api(`/admin/api/errors/${id}/resolve`, { method:'POST' });
  const e = allErrors.find(x=>x.id===id);
  if (e) e.resolved = true;
  renderErrors(); updateBadge();
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.background=err?'var(--red)':'var(--green)';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

setInterval(()=>{ if (password) loadAll(); }, 30000);
</script>
</body>
</html>
