  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0b1e;
      --sidebar: #100e24;
      --surface: rgba(255,255,255,0.05);
      --surface2: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.13);
      --text: #ede9fe;
      --muted: #7c7a9e;
      --accent: #8b5cf6;
      --green: #10b981;
      --red: #f43f5e;
      --gold: #f59e0b;
      --orange: #f97316;
      --teal: #06b6d4;
      --blue: #3b82f6;
    }
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: auto;
      overflow-y: hidden;
      min-width: 900px;
    }

    /* ── AURORA BACKGROUND ───────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 10%,  rgba(139,92,246,.22)  0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 85% 80%,  rgba(6,182,212,.18)   0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 60% 40%,  rgba(244,63,94,.10)   0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 40% 90%,  rgba(79,70,229,.15)   0%, transparent 65%);
    }

    /* ── LOGIN ───────────────────────────────────────────────────────────── */
    #login-screen {
      position: relative; z-index: 10;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 32px; padding: 52px; width: 400px; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06) inset;
    }
    .login-logo {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 30px; box-shadow: 0 8px 32px rgba(139,92,246,.5);
    }
    .login-card h1 { font-size: 28px; font-weight: 900; letter-spacing: -.04em; margin-bottom: 6px; }
    .login-card h1 span { background: linear-gradient(90deg, #a78bfa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .login-input {
      width: 100%; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 13px 16px; color: #fff; font-size: 15px; font-family: inherit;
      outline: none; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s;
    }
    .login-input::placeholder { color: rgba(255,255,255,.3); }
    .login-input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,.2); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #7c3aed, #06b6d4); color: #fff; border: none;
      border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 24px rgba(124,58,237,.45);
      transition: transform .1s, box-shadow .2s;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(124,58,237,.55); }
    .login-btn:active { transform: translateY(0); }
    .login-error { color: #fb7185; font-size: 13px; margin-top: 10px; }

    /* ── LAYOUT — SIDEBAR ────────────────────────────────────────────────── */
    #app { display: none; height: 100vh; min-height: 600px; min-width: 900px; position: relative; z-index: 10; }
    #app.visible { display: flex; }

    .sidebar {
      width: 230px; flex-shrink: 0;
      background: rgba(10,8,30,.85);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,.07);
      display: flex; flex-direction: column;
      padding: 0;
      box-shadow: 4px 0 32px rgba(0,0,0,.4);
      position: sticky; left: 0; z-index: 20;
    }
    .sb-brand {
      padding: 24px 22px 20px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sb-logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 12px;
      box-shadow: 0 4px 18px rgba(124,58,237,.45);
    }
    .sb-brand-name { font-size: 15px; font-weight: 900; letter-spacing: -.02em; }
    .sb-brand-name span { background: linear-gradient(90deg, #a78bfa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sb-brand-sub { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 500; }

    .sb-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 12px; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--muted);
      transition: all .15s; user-select: none; position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(124,58,237,.25), rgba(6,182,212,.12));
      color: #fff;
      border: 1px solid rgba(139,92,246,.25);
      box-shadow: 0 2px 12px rgba(124,58,237,.15);
    }
    .nav-icon { font-size: 17px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto; background: var(--red); color: #fff;
      font-size: 10px; font-weight: 700; border-radius: 999px;
      min-width: 18px; height: 18px; padding: 0 5px;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(244,63,94,.5);
    }
    .nav-badge.show { display: inline-flex; }
    .nav-badge-purple { background: #7c3aed; box-shadow: 0 2px 8px rgba(124,58,237,.5); }

    .sb-footer {
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex; flex-direction: column; gap: 6px;
    }
    .sb-time { font-size: 12px; color: var(--muted); padding: 6px 12px; text-align: center; }
    .sb-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--muted);
      background: transparent; border: none; font-family: inherit;
      transition: all .15s; width: 100%;
    }
    .sb-btn:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .sb-btn-danger:hover { background: rgba(244,63,94,.1); color: #fb7185; }

    /* ── MAIN CONTENT ────────────────────────────────────────────────────── */
    .main-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
    .page-header {
      padding: 24px 28px 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .page-title { font-size: 22px; font-weight: 900; letter-spacing: -.03em; }
    .page-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .header-refresh {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      color: var(--muted); padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all .15s;
    }
    .header-refresh:hover { color: var(--text); background: rgba(255,255,255,.1); }

    .main { flex: 1; overflow-y: auto; padding: 20px 28px 28px; }
    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* ── STAT CARDS ──────────────────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      border-radius: 20px; padding: 18px 20px;
      border: 1px solid rgba(255,255,255,.08);
      transition: transform .18s, box-shadow .18s;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: attr(data-icon);
      position: absolute; right: 14px; top: 12px;
      font-size: 28px; opacity: .25;
    }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 10px; opacity: .75;
    }
    .stat-card .value { font-size: 36px; font-weight: 900; letter-spacing: -.04em; color: #fff; }
    .sc-total    { background: linear-gradient(135deg, #4f46e5, #3b82f6); box-shadow: 0 6px 24px rgba(79,70,229,.35); }
    .sc-pending  { background: linear-gradient(135deg, #7c3aed, #9333ea); box-shadow: 0 6px 24px rgba(124,58,237,.35); }
    .sc-active   { background: linear-gradient(135deg, #059669, #06b6d4); box-shadow: 0 6px 24px rgba(5,150,105,.35); }
    .sc-expiring { background: linear-gradient(135deg, #d97706, #ea580c); box-shadow: 0 6px 24px rgba(217,119,6,.35); }
    .sc-expired  { background: linear-gradient(135deg, #be123c, #f43f5e); box-shadow: 0 6px 24px rgba(244,63,94,.35); }
    .sc-blocked  { background: linear-gradient(135deg, #374151, #4b5563); box-shadow: 0 6px 24px rgba(55,65,81,.35); }

    /* ── SEARCH / FILTERS ────────────────────────────────────────────────── */
    .toolbar { margin-bottom: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-input {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      color: var(--text); border-radius: 12px; padding: 10px 16px;
      font-size: 14px; font-family: inherit; outline: none; flex: 1; min-width: 200px;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,.25); }
    .search-input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
    .filter-btn {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: var(--muted); padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
      font-family: inherit; transition: all .15s;
    }
    .filter-btn:hover { color: var(--text); background: rgba(255,255,255,.1); }
    .filter-btn.active {
      background: linear-gradient(135deg, rgba(124,58,237,.3), rgba(6,182,212,.15));
      border-color: rgba(139,92,246,.4); color: #c4b5fd;
      box-shadow: 0 2px 12px rgba(124,58,237,.2);
    }

    /* ── TABLE ───────────────────────────────────────────────────────────── */
    .table-wrap {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 13px 20px; font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; text-align: left; border-bottom: 1px solid rgba(255,255,255,.07);
      font-weight: 700; background: rgba(255,255,255,.03);
    }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(139,92,246,.08); }
    tbody tr.frozen-row { opacity: .55; }
    tbody tr.revoked-row { opacity: .35; }
    tbody td { padding: 14px 20px; font-size: 14px; vertical-align: middle; }
    .shop-name { font-weight: 700; color: #e2e0ff; }
    .shop-id { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 999px;
    }
    .badge-active   { background: rgba(5,150,105,.18);  color: #34d399; border: 1px solid rgba(52,211,153,.25); }
    .badge-expiring { background: rgba(217,119,6,.15);  color: #fbbf24; border: 1px solid rgba(251,191,36,.25); }
    .badge-expired  { background: rgba(244,63,94,.15);  color: #fb7185; border: 1px solid rgba(251,113,133,.25); }
    .badge-frozen   { background: rgba(6,182,212,.12);  color: #22d3ee; border: 1px solid rgba(34,211,238,.2); }
    .badge-revoked  { background: rgba(244,63,94,.1);   color: #f87171; border: 1px solid rgba(248,113,113,.2); }
    .badge-new      { background: rgba(139,92,246,.15); color: #c4b5fd; border: 1px solid rgba(196,181,253,.2); }
    .type-chip {
      font-size: 12px; background: rgba(139,92,246,.12); border: 1px solid rgba(139,92,246,.2);
      padding: 3px 10px; border-radius: 999px; color: #a78bfa; font-weight: 600;
    }
    .days-bar { width: 72px; height: 5px; background: rgba(255,255,255,.1); border-radius: 99px; margin-top: 5px; overflow: hidden; }
    .days-fill { height: 100%; border-radius: 99px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

    /* ── DETAIL PANEL ────────────────────────────────────────────────────── */
    #panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(6px); z-index: 90; }
    #panel-overlay.open { display: block; }
    #detail-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 440px;
      background: rgba(18,14,42,.97);
      backdrop-filter: blur(28px);
      border-left: 1px solid rgba(139,92,246,.2);
      overflow-y: auto; transform: translateX(100%);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      z-index: 100; display: flex; flex-direction: column;
      box-shadow: -12px 0 60px rgba(0,0,0,.6);
    }
    #detail-panel.open { transform: translateX(0); }
    .dp-header {
      padding: 24px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(6,182,212,.08));
    }
    .dp-close {
      float: right; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      color: var(--muted); width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .dp-close:hover { background: rgba(244,63,94,.15); border-color: rgba(244,63,94,.3); color: #fb7185; }
    .dp-body { padding: 20px 24px; flex: 1; }
    .dp-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.07); }
    .dp-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; font-weight: 600; }
    .dp-value { font-size: 14px; color: var(--text); margin-bottom: 12px; word-break: break-all; }
    .dp-actions {
      padding: 20px 24px; border-top: 1px solid rgba(255,255,255,.07);
      display: flex; flex-direction: column; gap: 10px;
      background: rgba(0,0,0,.2);
    }
    .action-btn {
      width: 100%; border: none; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: transform .1s, box-shadow .2s; font-family: inherit;
    }
    .action-btn:hover { transform: translateY(-1px); }
    .action-btn:active { transform: translateY(0); }
    .action-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .btn-extend-big {
      background: linear-gradient(135deg, #059669, #06b6d4); color: #fff;
      box-shadow: 0 4px 18px rgba(6,182,212,.35);
    }
    .btn-freeze { background: rgba(6,182,212,.12); border: 1px solid rgba(6,182,212,.25) !important; color: #22d3ee; }
    .btn-unfreeze { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.25) !important; color: #34d399; }
    .btn-revoke { background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.2) !important; color: #fb7185; }
    .contact-row { display: flex; gap: 8px; }
    .contact-btn {
      flex: 1; border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 10px;
      text-align: center; font-size: 13px; font-weight: 600; cursor: pointer;
      background: rgba(255,255,255,.05); color: var(--muted); text-decoration: none; transition: all .15s;
    }
    .contact-btn:hover { background: rgba(139,92,246,.12); color: #c4b5fd; border-color: rgba(139,92,246,.3); }
    .contact-btn.wa { border-color: rgba(52,211,153,.25); color: #34d399; background: rgba(52,211,153,.07); }
    .contact-btn.wa:hover { background: rgba(52,211,153,.14); }

    /* ── ERRORS & CONTACTS ───────────────────────────────────────────────── */
    .errors-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .error-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; padding: 18px 20px; margin-bottom: 12px;
      transition: border-color .15s, background .15s;
    }
    .error-card:hover { background: rgba(255,255,255,.06); border-color: rgba(244,63,94,.2); }
    .error-card.resolved { opacity: .4; }
    .error-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .error-shop { font-weight: 700; font-size: 14px; color: #e2e0ff; }
    .error-time { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .error-msg {
      font-size: 13px; color: #fb7185; font-family: monospace;
      background: rgba(244,63,94,.07); border: 1px solid rgba(244,63,94,.15);
      padding: 10px 14px; border-radius: 10px; word-break: break-word;
    }
    .error-stack {
      font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 8px;
      white-space: pre-wrap; word-break: break-word; display: none;
      background: rgba(0,0,0,.3); padding: 12px; border-radius: 10px;
      max-height: 200px; overflow-y: auto; border: 1px solid rgba(255,255,255,.06);
    }
    .error-stack.open { display: block; }
    .error-btns { display: flex; gap: 8px; margin-top: 12px; }
    .btn-sm {
      padding: 6px 14px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05); color: var(--muted);
      font-family: inherit; transition: all .15s;
    }
    .btn-sm:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
    .btn-sm-green { border-color: rgba(52,211,153,.2); color: #34d399; background: rgba(52,211,153,.07); }
    .btn-sm-green:hover { background: rgba(52,211,153,.14); border-color: rgba(52,211,153,.35); }

    /* ── TOAST ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #059669, #06b6d4); color: #fff;
      padding: 13px 26px; border-radius: 14px; font-size: 14px; font-weight: 700;
      opacity: 0; transition: opacity .22s; pointer-events: none; z-index: 200;
      box-shadow: 0 8px 28px rgba(6,182,212,.4);
    }
    #toast.show { opacity: 1; }

    /* ── CODE MODAL ──────────────────────────────────────────────────────── */
    #code-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      z-index: 300; display: none; align-items: center; justify-content: center;
    }
    #code-modal-overlay.open { display: flex; }
    #code-modal {
      background: rgba(20,15,45,.97); border: 1px solid rgba(139,92,246,.3);
      border-radius: 24px; padding: 36px; width: 360px; text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
    }

    /* ── SCROLLBAR ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,.3); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,.5); }

    /* ── SPINNER ─────────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    .sb-btn.loading, .action-btn.loading { opacity: .6; pointer-events: none; }
    .action-btn.loading { cursor: not-allowed; }
    @keyframes pulse-glow { 0%,100%{ box-shadow: 0 4px 18px rgba(6,182,212,.35); } 50%{ box-shadow: 0 4px 28px rgba(6,182,212,.65); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo" style="background:none;box-shadow:none;padding:0;overflow:hidden">
      <svg width="64" height="64" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lgl" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#fda4af"/>
            <stop offset="50%"  stop-color="#f43f5e"/>
            <stop offset="100%" stop-color="#9f1239"/>
          </linearGradient>
        </defs>
        <rect width="256" height="256" rx="64" fill="url(#lgl)"/>
        <text x="128" y="162" font-family="Arial Rounded MT Bold,Arial,sans-serif" font-weight="900" font-size="98" fill="white" text-anchor="middle" letter-spacing="-4">fsa</text>
      </svg>
    </div>
    <h1>Front<span>Stores</span></h1>
    <p>Admin Dashboard · Rakesh Soni</p>
    <input class="login-input" type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Sign In →</button>

  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo" style="background:none;box-shadow:none;padding:0;overflow:hidden">
      <svg width="44" height="44" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sbl" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#fda4af"/>
            <stop offset="50%"  stop-color="#f43f5e"/>
            <stop offset="100%" stop-color="#9f1239"/>
          </linearGradient>
        </defs>
        <rect width="256" height="256" rx="64" fill="url(#sbl)"/>
        <text x="128" y="162" font-family="Arial Rounded MT Bold,Arial,sans-serif" font-weight="900" font-size="98" fill="white" text-anchor="middle" letter-spacing="-4">fsa</text>
      </svg>
    </div>
      <div class="sb-brand-name">Front<span>Stores</span></div>
      <div class="sb-brand-sub">Admin Console</div>
    </div>

    <nav class="sb-nav">
      <div class="nav-item active" id="tab-customers" onclick="switchTab('customers')">
        <span class="nav-icon">👥</span> Customers
        <span class="nav-badge nav-badge-purple" id="pending-badge">0</span>
      </div>
      <div class="nav-item" id="tab-contacts" onclick="switchTab('contacts')">
        <span class="nav-icon">💬</span> Contacts
        <span class="nav-badge" id="contact-badge">0</span>
      </div>
      <div class="nav-item" id="tab-errors" onclick="switchTab('errors')">
        <span class="nav-icon">⚠️</span> Errors
        <span class="nav-badge" id="error-badge">0</span>
      </div>
    </nav>

    <div class="sb-footer">
      <div class="sb-time" id="clock"></div>
      <button class="sb-btn" id="refresh-btn" onclick="loadAll()"><span id="refresh-icon">↻</span> &nbsp;Refresh data</button>
      <button class="sb-btn sb-btn-danger" onclick="logout()">⎋ &nbsp;Logout</button>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="page-header">
      <div>
        <div class="page-title" id="page-title">Customers</div>
        <div class="page-sub" id="page-sub">All registered shops</div>
      </div>
    </div>

  <div class="main">

    <!-- CUSTOMERS -->
    <div class="tab-page active" id="page-customers">
      <div class="stats-row">
        <div class="stat-card sc-total"    data-icon="🏪"><div class="label">Total</div><div class="value" id="s-total">—</div></div>
        <div class="stat-card sc-pending"  data-icon="⏳"><div class="label">Pending</div><div class="value" id="s-pending">—</div></div>
        <div class="stat-card sc-active"   data-icon="✓"><div class="label">Active</div><div class="value" id="s-active">—</div></div>
        <div class="stat-card sc-expiring" data-icon="⚡"><div class="label">Expiring 7d</div><div class="value" id="s-expiring">—</div></div>
        <div class="stat-card sc-expired"  data-icon="✕"><div class="label">Expired</div><div class="value" id="s-expired">—</div></div>
        <div class="stat-card sc-blocked"  data-icon="🔒"><div class="label">Blocked</div><div class="value" id="s-blocked">—</div></div>
      </div>

      <div class="toolbar">
        <input class="search-input" id="search" placeholder="Search by shop name, owner or ID…" oninput="renderCustomers()" />
        <button class="filter-btn active" id="f-all"      onclick="setFilter('all')">All</button>
        <button class="filter-btn"        id="f-pending"  onclick="setFilter('pending')">⏳ Pending</button>
        <button class="filter-btn"        id="f-active"   onclick="setFilter('active')">Active</button>
        <button class="filter-btn"        id="f-expiring" onclick="setFilter('expiring')">Expiring</button>
        <button class="filter-btn"        id="f-expired"  onclick="setFilter('expired')">Expired</button>
        <button class="filter-btn"        id="f-frozen"   onclick="setFilter('frozen')">Frozen</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Shop</th><th>Type</th><th>Contact</th><th>Joined</th><th>Subscription</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- CONTACTS -->
    <div class="tab-page" id="page-contacts">
      <div class="errors-toolbar">
        <input class="search-input" id="con-search" placeholder="Search contacts…" oninput="renderContacts()" style="max-width:300px" />
        <button class="filter-btn active" id="cf-all"      onclick="setCFilter('all')">All</button>
        <button class="filter-btn"        id="cf-open"     onclick="setCFilter('open')">Open</button>
        <button class="filter-btn"        id="cf-resolved" onclick="setCFilter('resolved')">Resolved</button>
      </div>
      <div id="contacts-list"></div>
    </div>

    <!-- ERRORS -->
    <div class="tab-page" id="page-errors">
      <div class="errors-toolbar">
        <input class="search-input" id="err-search" placeholder="Search errors…" oninput="renderErrors()" style="max-width:300px" />
        <button class="filter-btn active" id="ef-all"      onclick="setEFilter('all')">All</button>
        <button class="filter-btn"        id="ef-open"     onclick="setEFilter('open')">Open</button>
        <button class="filter-btn"        id="ef-resolved" onclick="setEFilter('resolved')">Resolved</button>

<!-- Detail panel -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="detail-panel">
  <div class="dp-header">
    <button class="dp-close" onclick="closePanel()">✕</button>
    <div id="dp-title" style="font-size:18px;font-weight:800;margin-bottom:4px"></div>
    <div id="dp-sub" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
  </div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-actions" id="dp-actions"></div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:3002';
const ICONS = { medical:'💊', restaurant:'🍽️' };
const CSRF_TOKEN = window.__CSRF_TOKEN__ || '';
let password = '', allCustomers = [], allErrors = [], allContacts = [], filter = 'all', eFilter = 'all', cFilter = 'all', openId = null;

// ── Security helpers ─────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeId(s) { return String(s||'').replace(/[^a-zA-Z0-9\-_]/g,''); }

// ── Idle session timeout (30 minutes) ────────────────────────────────────────
let _idleTimer = null;
function resetIdleTimer() {
  clearTimeout(_idleTimer);
  if (!password) return;
  _idleTimer = setTimeout(() => { logout(); showToast('Session expired due to inactivity', true); }, 30 * 60 * 1000);
}
['click','keydown','mousemove','touchstart'].forEach(e => document.addEventListener(e, resetIdleTimer, {passive:true}));

function logout() {
  password = '';
  allCustomers = []; allErrors = []; openId = null;
  clearTimeout(_idleTimer);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='';
  document.getElementById('pwd-input').value='';
  closePanel();
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}, 1000);

const PAGE_META = {
  customers: { title: 'Customers', sub: 'All registered shops' },
  contacts:  { title: 'Contacts',  sub: 'Enquiries from potential customers' },
  errors:    { title: 'Error Log', sub: 'Crashes reported from customer apps' },
};
function switchTab(t) {
  ['customers','contacts','errors'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
    document.getElementById('page-'+x).classList.toggle('active', x===t);
  });
  const m = PAGE_META[t] || {};
  document.getElementById('page-title').textContent = m.title || t;
  document.getElementById('page-sub').textContent   = m.sub   || '';
}

function login() {
  const p = document.getElementById('pwd-input').value;
  if (!p) return;
  password = p;
  document.getElementById('login-error').textContent = '';
  loadAll(true);
}

async function api(path, opts={}) {
  return fetch(API+path, {
    ...opts,
    headers: {
      'Authorization': `Basic ${btoa(':'+password)}`,
      'Content-Type': 'application/json',
      'X-CSRF-Token': CSRF_TOKEN,
      ...(opts.headers||{})
    }
  });
}

async function loadAll(isLogin=false, silent=false) {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  if (!silent) { if (btn) btn.classList.add('loading'); if (icon) { icon.className = 'spin'; icon.textContent = '↻'; } }
  try {
    const [cr, er, conr] = await Promise.all([
      api('/admin/api/customers'),
      api('/admin/api/errors'),
      api('/admin/api/contacts'),
    ]);
    if (cr.status === 401) { if (isLogin) document.getElementById('login-error').textContent = 'Wrong password'; return; }
    allCustomers = await cr.json();
    allErrors    = await er.json();
    allContacts  = await conr.json();
    if (isLogin) { document.getElementById('login-screen').style.display='none'; document.getElementById('app').classList.add('visible'); resetIdleTimer(); }
    updateStats(); renderCustomers(); renderErrors(); renderContacts(); updateBadge();
    if (openId) { const c = allCustomers.find(x=>x.tenant_id===openId); if (c) renderPanel(c); }
    if (!isLogin && !silent) showToast('✓ Data refreshed');
  } catch(e) {
    if (isLogin) document.getElementById('login-error').textContent = 'Cannot connect. Is server running?';
    else showToast('⚠ Could not connect to server', true);
  } finally {
    if (btn)  btn.classList.remove('loading');
    if (icon) { icon.className = ''; icon.textContent = '↻'; }
  }
}

function daysLeft(exp) { return exp ? Math.ceil((new Date(exp)-Date.now())/(864e5)) : 0; }
function subStatus(c) {
  if (c.account_status === 'pending') return 'pending';
  if (c.account_status === 'frozen') return 'frozen';
  if (c.account_status === 'revoked') return 'revoked';
  const d = daysLeft(c.expires_at);
  if (d > 7) return 'active';
  if (d > 0) return 'expiring';
  return 'expired';
}

function updateStats() {
  document.getElementById('s-total').textContent   = allCustomers.length;
  document.getElementById('s-pending').textContent = allCustomers.filter(c=>subStatus(c)==='pending').length;
  document.getElementById('s-active').textContent  = allCustomers.filter(c=>subStatus(c)==='active').length;
  document.getElementById('s-expiring').textContent= allCustomers.filter(c=>subStatus(c)==='expiring').length;
  document.getElementById('s-expired').textContent = allCustomers.filter(c=>subStatus(c)==='expired').length;
  document.getElementById('s-blocked').textContent = allCustomers.filter(c=>['frozen','revoked'].includes(subStatus(c))).length;
}
function updateBadge() {
  const ne = allErrors.filter(e=>!e.resolved).length;
  const be = document.getElementById('error-badge');
  be.textContent = ne; be.classList.toggle('show', ne>0);
  const nc = allContacts.filter(c=>!c.resolved).length;
  const bc = document.getElementById('contact-badge');
  bc.textContent = nc; bc.classList.toggle('show', nc>0);
  const np = allCustomers.filter(c=>subStatus(c)==='pending').length;
  const bp = document.getElementById('pending-badge');
  bp.textContent = np; bp.classList.toggle('show', np>0);
}

function setFilter(f) {
  filter = f;
  ['all','pending','active','expiring','expired','frozen'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',x===f));
  renderCustomers();
}

function renderCustomers() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = allCustomers.filter(c => {
    const st = subStatus(c);
    if (filter !== 'all' && st !== filter) return false;
    if (!q) return true;
    return (c.shop_name||'').toLowerCase().includes(q)||(c.owner_name||'').toLowerCase().includes(q)||(c.tenant_id||'').toLowerCase().includes(q);
  });

  const tbody = document.getElementById('tbody');
  if (!list.length) { tbody.innerHTML=`<tr><td colspan="5"><div class="empty">No customers found</div></td></tr>`; return; }

  tbody.innerHTML = list.map(c => {
    const st = subStatus(c);
    const d = daysLeft(c.expires_at);
    const icon = ICONS[c.shop_type]||'🏪';
    const reg = c.registered_at ? new Date(c.registered_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';

    let badge, bar='';
    if (st==='pending')  { badge=`<span class="badge" style="background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)">⏳ Pending Approval</span>`; }
    else if (st==='active')   { badge=`<span class="badge badge-active">✓ ${d}d left</span>`; bar=`<div class="days-bar"><div class="days-fill" style="width:${Math.min(100,(d/30)*100)}%;background:var(--green)"></div></div>`; }
    else if (st==='expiring') { badge=`<span class="badge badge-expiring">⚠ ${d}d left</span>`; bar=`<div class="days-bar"><div class="days-fill" style="width:${Math.min(100,(d/30)*100)}%;background:var(--gold)"></div></div>`; }
    else if (st==='expired')  { badge=`<span class="badge badge-expired">✕ Expired</span>`; }
    else if (st==='frozen')   { badge=`<span class="badge badge-frozen">🧊 Frozen</span>`; }
    else if (st==='revoked')  { badge=`<span class="badge badge-revoked">🚫 Revoked</span>`; }

    const rowClass = st==='frozen'?'frozen-row':st==='revoked'?'revoked-row':'';
    const tid = escHtml(c.tenant_id||'');
    return `<tr class="${rowClass}" onclick="openPanel('${tid}')">
      <td><div class="shop-name">${escHtml(c.shop_name||'Unknown')}</div><div class="shop-id">${tid.substring(0,20)}…</div></td>
      <td><span class="type-chip">${icon} ${escHtml(c.shop_type||'—')}</span></td>
      <td><div style="font-size:13px">${escHtml(c.owner_name||'—')}</div><div style="font-size:12px;color:var(--muted)">${escHtml(c.phone||c.email||'—')}</div></td>
      <td style="color:var(--muted);font-size:13px">${reg}</td>
      <td>${badge}${bar}</td>
    </tr>`;
  }).join('');
}

function openPanel(id) {
  openId = id;
  const c = allCustomers.find(x=>x.tenant_id===id);
  if (!c) return;
  renderPanel(c);
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}

function renderPanel(c) {
  const st = subStatus(c);
  const d = daysLeft(c.expires_at);
  const icon = ICONS[c.shop_type]||'🏪';
  const errs = allErrors.filter(e=>e.tenant_id===c.tenant_id&&!e.resolved).length;

  let statusBadge;
  if (st==='pending')  statusBadge=`<span class="badge" style="background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)">⏳ Pending Approval</span>`;
  else if (st==='active')   statusBadge=`<span class="badge badge-active">✓ Active · ${d} days left</span>`;
  else if (st==='expiring') statusBadge=`<span class="badge badge-expiring">⚠ Expiring · ${d} days left</span>`;
  else if (st==='expired')  statusBadge=`<span class="badge badge-expired">✕ Expired</span>`;
  else if (st==='frozen')   statusBadge=`<span class="badge badge-frozen">🧊 Frozen</span>`;
  else if (st==='revoked')  statusBadge=`<span class="badge badge-revoked">🚫 Revoked</span>`;

  document.getElementById('dp-title').textContent = c.shop_name||'Unknown';
  document.getElementById('dp-sub').innerHTML = `${icon} ${escHtml(c.shop_type||'—')} ${errs>0?`<span style="color:var(--red);margin-left:8px">⚠ ${errs} open error${errs>1?'s':''}</span>`:''}`;

  document.getElementById('dp-body').innerHTML = `
    <div style="margin-bottom:16px">${statusBadge}</div>

    <div class="dp-label">Owner</div><div class="dp-value">${escHtml(c.owner_name||'—')}</div>
    <div class="dp-label">Phone</div><div class="dp-value">${escHtml(c.phone||'—')}</div>
    <div class="dp-label">Email</div><div class="dp-value">${escHtml(c.email||'—')}</div>
    <div class="dp-label">City</div><div class="dp-value">${escHtml(c.city||'—')}</div>
    ${c.gstin?`<div class="dp-label">GSTIN</div><div class="dp-value">${escHtml(c.gstin)}</div>`:''}

    <div class="dp-section">
      <div class="dp-label">Shop ID</div><div class="dp-value" style="font-family:monospace;font-size:12px">${escHtml(c.tenant_id)}</div>
      <div class="dp-label">Registered</div><div class="dp-value">${c.registered_at?new Date(c.registered_at).toLocaleString('en-IN'):'—'}</div>
      <div class="dp-label">Expires</div><div class="dp-value">${escHtml(c.expires_at||'—')}</div>
    </div>

    <div class="dp-section">
      <div class="contact-row">
        ${c.phone?`<a href="https://wa.me/91${encodeURIComponent(c.phone.replace(/[^0-9]/g,''))}?text=Hi+${encodeURIComponent(c.owner_name||'')},+your+FrontStores+subscription+is+activated!" class="contact-btn wa">💬 WhatsApp</a>`:''}
        ${c.email?`<a href="mailto:${encodeURIComponent(c.email)}?subject=FrontStores+Subscription" class="contact-btn">📧 Email</a>`:''}
      </div>
    </div>
  `;

  // Action buttons depend on current status
  const isPending = st === 'pending';
  const isFrozen = st === 'frozen';
  const isRevoked = st === 'revoked';
  const hasResetReq = !!c.reset_requested_at && !c.reset_token;
  const hasResetCode = !!c.reset_token;
  const hasUnlockReq = !!c.unlock_requested_at && !c.unlock_token;
  const hasUnlockCode = !!c.unlock_token;
  const tid = escHtml(c.tenant_id||'');
  document.getElementById('dp-actions').innerHTML = `
    ${isPending ? `<button class="action-btn" style="background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;font-size:15px;padding:14px;box-shadow:0 4px 18px rgba(124,58,237,.4)" onclick="doAction('${tid}','approve',this)">
      ✅ Approve &amp; Start 30-Day Trial
    </button><div style="border-top:1px solid rgba(255,255,255,.07);margin:8px 0"></div>` : ''}
    <button class="action-btn btn-extend-big" onclick="doAction('${tid}','extend',this)" ${isRevoked?'disabled':''}>
      ➕ Extend 30 Days
    </button>
    ${isFrozen
      ? `<button class="action-btn btn-unfreeze" onclick="doAction('${tid}','unfreeze',this)">✅ Unfreeze Account</button>`
      : `<button class="action-btn btn-freeze" onclick="doAction('${tid}','freeze',this)" ${isRevoked?'disabled':''}>🧊 Freeze Account</button>`
    }
    ${!isRevoked
      ? `<button class="action-btn btn-revoke" onclick="confirmRevoke('${tid}')">🚫 Revoke Access</button>`
      : `<button class="action-btn btn-unfreeze" onclick="doAction('${tid}','unfreeze',this)">↩ Restore Access</button>`
    }

    <div style="border-top:1px solid rgba(255,255,255,.07);margin:8px 0"></div>

    ${hasUnlockCode
      ? `<div style="background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:14px;text-align:center">
           <div style="font-size:13px;font-weight:700;color:#22d3ee;margin-bottom:4px">🔓 Unlock code is active</div>
           <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Code was shown when generated. Share it with the customer.</div>
           <button class="action-btn btn-revoke" style="padding:8px" onclick="clearUnlockCode('${tid}')">✕ Clear Code</button>
         </div>`
      : hasUnlockReq
        ? `<button class="action-btn" style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.25);color:#22d3ee" onclick="generateUnlockCode('${tid}')">
             🔓 Generate Unlock Code <span style="font-size:11px;display:block;font-weight:400;margin-top:2px;color:var(--muted)">Requested ${new Date(c.unlock_requested_at).toLocaleString('en-IN')}</span>
           </button>`
        : `<button class="action-btn" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted)" onclick="generateUnlockCode('${tid}')">
             🔓 Unlock Account (too many attempts)
           </button>`
    }

    <div style="border-top:1px solid rgba(255,255,255,.07);margin:4px 0"></div>

    ${hasResetCode
      ? `<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:14px;text-align:center">
           <div style="font-size:13px;font-weight:700;color:#34d399;margin-bottom:4px">🔑 Reset code is active</div>
           <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Code was shown when generated. Share it with the customer.</div>
           <button class="action-btn btn-revoke" style="padding:8px" onclick="clearResetCode('${tid}')">✕ Clear Code</button>
         </div>`
      : hasResetReq
        ? `<button class="action-btn" style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:#fbbf24" onclick="generateResetCode('${tid}')">
             🔑 Generate Reset Code <span style="font-size:11px;display:block;font-weight:400;margin-top:2px">Reset requested ${new Date(c.reset_requested_at).toLocaleString('en-IN')}</span>
           </button>`
        : `<button class="action-btn" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted)" onclick="generateResetCode('${tid}')">
             🔑 Generate Password Reset Code
           </button>`
    }
  `;
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  openId = null;
}

async function doAction(id, action, el) {
  const c = allCustomers.find(x=>x.tenant_id===id);
  const msgs = { extend:'Extended 30 days', freeze:'Account frozen', unfreeze:'Account unfrozen', revoke:'Access revoked', approve:'Approved — trial started' };
  const origText = el?.innerHTML;
  if (el) { el.classList.add('loading'); el.innerHTML = `<span class="spin">↻</span> Working…`; }
  try {
    const r = await api(`/admin/api/customers/${id}/${action}`, { method:'POST' });
    if (!r.ok) { showToast('Action failed', true); return; }
    showToast(`✅ ${msgs[action] || action} — ${c?.shop_name||id.substring(0,8)}`);
    await loadAll();
  } catch { showToast('⚠ Connection error', true); }
  finally { if (el) { el.classList.remove('loading'); el.innerHTML = origText; } }
}

function confirmRevoke(id) {
  const c = allCustomers.find(x=>x.tenant_id===id);
  const name = c?.shop_name || id.substring(0,8);
  if (!confirm(`Revoke access for "${name}"?\n\nTheir app will be locked immediately. This can be reversed by clicking "Restore Access".`)) return;
  doAction(id, 'revoke');
}

function showCodeModal(title, code) {
  const old = document.getElementById('code-modal');
  if (old) old.remove();
  const m = document.createElement('div');
  m.id = 'code-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center';
  m.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:340px;text-align:center">
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${escHtml(title)}</div>
    <div style="font-size:40px;font-weight:900;letter-spacing:10px;color:var(--accent);font-family:monospace">${escHtml(code)}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">Share this with the customer.<br>This code will <strong>not</strong> be shown again.</div>
    <button onclick="document.getElementById('code-modal').remove()" style="margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer">Done ✓</button>
  </div>`;
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
  document.body.appendChild(m);
}

async function withBtnLoad(btn, fn) {
  const el = btn instanceof Element ? btn : event?.target?.closest('button');
  const orig = el?.innerHTML;
  if (el) { el.classList.add('loading'); el.innerHTML = `<span class="spin">↻</span> Working…`; }
  try { await fn(); }
  finally { if (el) { el.classList.remove('loading'); el.innerHTML = orig; } }
}

async function generateResetCode(id) {
  await withBtnLoad(null, async () => {
    const code = String(Math.floor(100000 + Math.random() * 900000));
    const expires = new Date(Date.now() + 24*60*60*1000).toISOString();
    const r = await api(`/admin/api/customers/${id}/set-reset-code`, { method:'POST', body: JSON.stringify({ code, expires }) });
    if (r.ok) { showCodeModal('🔑 Password Reset Code (valid 24 hours)', code); await loadAll(); }
    else showToast('Failed to generate reset code', true);
  });
}

async function clearResetCode(id) {
  await withBtnLoad(null, async () => {
    await api(`/admin/api/customers/${id}/set-reset-code`, { method:'POST', body: JSON.stringify({ code: null, expires: null }) });
    showToast('Reset code cleared');
    await loadAll();
  });
}

async function generateUnlockCode(id) {
  await withBtnLoad(null, async () => {
    const code = String(Math.floor(100000 + Math.random() * 900000));
    const expires = new Date(Date.now() + 2*60*60*1000).toISOString();
    const r = await api(`/admin/api/customers/${id}/set-unlock-code`, { method:'POST', body: JSON.stringify({ code, expires }) });
    if (r.ok) { showCodeModal('🔓 Unlock Code (valid 2 hours)', code); await loadAll(); }
    else showToast('Failed to generate unlock code', true);
  });
}

async function clearUnlockCode(id) {
  await withBtnLoad(null, async () => {
    await api(`/admin/api/customers/${id}/set-unlock-code`, { method:'POST', body: JSON.stringify({ code: null, expires: null }) });
    showToast('Unlock code cleared');
    await loadAll();
  });
}

// CONTACTS
function setCFilter(f) {
  cFilter = f;
  ['all','open','resolved'].forEach(x=>document.getElementById('cf-'+x).classList.toggle('active',x===f));
  renderContacts();
}

function renderContacts() {
  const q = (document.getElementById('con-search')?.value||'').toLowerCase();
  let list = allContacts.filter(c=>{
    if (cFilter==='open' && c.resolved) return false;
    if (cFilter==='resolved' && !c.resolved) return false;
    if (q && !(c.name||'').toLowerCase().includes(q) && !(c.mobile||'').includes(q) && !(c.email||'').toLowerCase().includes(q) && !(c.shop_type||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('contacts-list');
  if (!list.length) { el.innerHTML=`<div class="empty">No contact inquiries yet.</div>`; return; }
  el.innerHTML = list.map(c=>{
    const t = new Date(c.received_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const cid = escHtml(c.id);
    return `<div class="error-card ${c.resolved?'resolved':''}">
      <div class="error-top">
        <div>
          <span class="error-shop">${escHtml(c.name||'Unknown')}</span>
          ${c.shop_type?` <span class="type-chip" style="font-size:11px">${escHtml(c.shop_type)}</span>`:''}
        </div>
        <div class="error-time">${t}</div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin:8px 0;font-size:13px">
        <span>📱 <a href="tel:${escHtml(c.mobile)}" style="color:#93c5fd">${escHtml(c.mobile)}</a></span>
        <span>📧 <a href="mailto:${escHtml(c.email)}" style="color:#93c5fd">${escHtml(c.email)}</a></span>
      </div>
      ${c.message?`<div class="error-msg" style="color:#e2e8f0">${escHtml(c.message)}</div>`:''}
      <div class="error-btns">
        ${!c.resolved
          ? `<button class="btn-sm btn-sm-green" onclick="resolveContact('${cid}')">✓ Mark Done</button>`
          : `<span style="font-size:12px;color:var(--muted)">✓ Resolved</span>`}
        ${c.mobile?`<a href="https://wa.me/91${escHtml(c.mobile.replace(/\D/g,''))}" target="_blank" class="btn-sm" style="border-color:rgba(34,197,94,.2);color:var(--green)">💬 WhatsApp</a>`:''}
        ${c.email?`<a href="mailto:${escHtml(c.email)}" class="btn-sm">📧 Email</a>`:''}
      </div>
    </div>`;
  }).join('');
}

async function resolveContact(id) {
  await api(`/admin/api/contacts/${id}/resolve`, { method:'POST' });
  const c = allContacts.find(x=>x.id===id);
  if (c) c.resolved = true;
  renderContacts(); updateBadge();
}

// ERRORS
function setEFilter(f) {
  eFilter = f;
  ['all','open','resolved'].forEach(x=>document.getElementById('ef-'+x).classList.toggle('active',x===f));
  renderErrors();
}

function renderErrors() {
  const q = document.getElementById('err-search').value.toLowerCase();
  let list = allErrors.filter(e=>{
    if (eFilter==='open' && e.resolved) return false;
    if (eFilter==='resolved' && !e.resolved) return false;
    if (q && !(e.message||'').toLowerCase().includes(q) && !(e.shop_name||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('errors-list');
  if (!list.length) { el.innerHTML=`<div class="empty">No errors. Looking good ✓</div>`; return; }
  el.innerHTML = list.map(e=>{
    const icon = ICONS[e.shop_type]||'🏪';
    const t = new Date(e.received_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const hasStack = e.stack && e.stack.trim();
    return `<div class="error-card ${e.resolved?'resolved':''}">
      <div class="error-top">
        <div><span class="error-shop">${icon} ${escHtml(e.shop_name||'Unknown')}</span>${e.app_version?` <span style="font-size:11px;color:var(--muted)">v${escHtml(e.app_version)}</span>`:''}</div>
        <div class="error-time">${t}</div>
      </div>
      <div class="error-msg">${escHtml(e.message)}</div>
      ${hasStack?`<div class="error-stack" id="stack-${e.id}">${escHtml(e.stack)}</div>`:''}
      <div class="error-btns">
        ${!e.resolved?`<button class="btn-sm btn-sm-green" onclick="resolveErr('${e.id}')">✓ Resolve</button>`:`<span style="font-size:12px;color:var(--muted)">✓ Resolved</span>`}
        ${hasStack?`<button class="btn-sm" onclick="toggleStack('${e.id}')">Stack trace</button>`:''}
        <button class="btn-sm" onclick="openPanel('${e.tenant_id}')">View shop</button>
      </div>
    </div>`;
  }).join('');
}

function toggleStack(id) { document.getElementById('stack-'+id)?.classList.toggle('open'); }
async function resolveErr(id) {
  await api(`/admin/api/errors/${id}/resolve`, { method:'POST' });
  const e = allErrors.find(x=>x.id===id);
  if (e) e.resolved = true;
  renderErrors(); updateBadge();
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err
    ? 'linear-gradient(135deg,#be123c,#f43f5e)'
    : 'linear-gradient(135deg,#059669,#06b6d4)';
  t.style.boxShadow = err
    ? '0 8px 28px rgba(244,63,94,.45)'
    : '0 8px 28px rgba(6,182,212,.4)';
  t.classList.remove('show');
  void t.offsetWidth; // force reflow so animation re-triggers
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

setInterval(()=>{ if (password) loadAll(false, true); }, 120000);
</script>
