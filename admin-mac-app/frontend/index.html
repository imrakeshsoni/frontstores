<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrontStores Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080c14;
      color: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px;
    }
    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .logo span {
      background: linear-gradient(135deg, #4f8ef7, #7c6af7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub {
      color: #6b7898;
      font-size: 14px;
      margin-bottom: 40px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(79,142,247,.2);
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      color: #6b7898;
      font-size: 13px;
      height: 20px;
      transition: opacity .3s;
    }
    .dot {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0 } 40% { opacity: 1 } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Front<span>Stores</span></div>
    <div class="sub">Admin Panel</div>
    <div class="spinner"></div>
    <div class="status" id="status">
      Starting server<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
  </div>
  <script>
    let tick = 0;
    const msgs = [
      'Starting server',
      'Starting server',
      'Waiting for server',
      'Waiting for server',
      'Almost ready',
      'Almost ready',
    ];
    setInterval(() => {
      const el = document.getElementById('status');
      const msg = msgs[Math.min(tick++, msgs.length - 1)];
      el.innerHTML = `${msg}<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;
    }, 2000);
  </script>
</body>
</html>
