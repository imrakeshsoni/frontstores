version: '3.9'

# Local dev infra only — postgres + redis.
# Run services directly: npm run dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: frontstores_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shoposphere
      POSTGRES_PASSWORD: shoposphere
      POSTGRES_DB: shoposphere
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tools/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shoposphere']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: frontstores_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass shoposphere
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'shoposphere', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
