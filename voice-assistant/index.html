<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart — AI Voice Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --accent:#a855f7;
  --accent2:#ec4899;
  --bg:#060010;
  --panel:#0c0020;
  --text:#f1e8ff;
  --muted:#8b6eaa;
}

body{
  background:var(--bg);
  height:100vh;overflow:hidden;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:var(--text);
  display:grid;
  grid-template-columns:58% 42%;
}

/* ═══ LEFT — AVATAR PANEL ═══ */
.left{
  position:relative;
  overflow:hidden;
  background:radial-gradient(ellipse 80% 100% at 50% 60%,#1a0040 0%,#080015 60%,#02000a 100%);
}

/* Atmospheric bokeh bg */
.bokeh{position:absolute;inset:0;pointer-events:none}
.bk{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle,var(--c) 0%,transparent 70%);
  filter:blur(8px);
  opacity:0.18;
}

/* Avatar SVG — fills the panel */
.avatar-svg{
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  height:100%;
  width:auto;
  max-width:100%;
  filter:drop-shadow(0 0 40px rgba(168,85,247,0.25));
}

/* Gradient fade at bottom */
.left::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:120px;
  background:linear-gradient(to top,#060010,transparent);
  pointer-events:none;
}

/* Status rings around avatar — glow rings at bottom */
.avatar-rings{
  position:absolute;
  bottom:60px;left:50%;
  transform:translateX(-50%);
  width:160px;height:40px;
  pointer-events:none;
}
.a-ring{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px solid var(--accent);
  opacity:0;
  animation:ring-idle 3s ease-in-out infinite;
}
.a-ring:nth-child(1){width:160px;height:44px;animation-delay:0s}
.a-ring:nth-child(2){width:200px;height:56px;animation-delay:0.8s;border-color:var(--accent2)}
.a-ring:nth-child(3){width:240px;height:68px;animation-delay:1.6s;opacity:0!important}

@keyframes ring-idle{0%,100%{opacity:0;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.35;transform:translate(-50%,-50%) scale(1.02)}}

.avatar-rings.listening .a-ring{border-color:#22c55e;animation:ring-listen 0.7s ease-in-out infinite alternate}
@keyframes ring-listen{from{opacity:0.4;transform:translate(-50%,-50%) scale(1)}to{opacity:0.9;transform:translate(-50%,-50%) scale(1.06)}}

.avatar-rings.speaking .a-ring{animation:ring-speak 0.4s ease-in-out infinite alternate}
@keyframes ring-speak{from{opacity:0.5;transform:translate(-50%,-50%) scale(1)}to{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}

/* Name overlay on avatar */
.name-overlay{
  position:absolute;
  top:28px;left:28px;
  z-index:10;
}
.name-overlay .nm{
  font-size:2.4rem;font-weight:800;
  background:linear-gradient(135deg,#d8b4fe,#f9a8d4);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:0.04em;line-height:1;
}
.name-overlay .sub{
  font-size:0.7rem;color:var(--muted);
  letter-spacing:0.12em;text-transform:uppercase;margin-top:3px;
}

/* Waveform on avatar panel */
.waveform{
  position:absolute;
  bottom:28px;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:flex-end;gap:3px;
  height:36px;opacity:0;
  transition:opacity 0.3s;z-index:10;
}
.waveform.on{opacity:1}
.wb{width:3px;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:2px;height:4px;animation:wba 0.6s ease-in-out infinite}
.wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.07s}.wb:nth-child(3){animation-delay:.14s}
.wb:nth-child(4){animation-delay:.21s}.wb:nth-child(5){animation-delay:.28s}.wb:nth-child(6){animation-delay:.21s}
.wb:nth-child(7){animation-delay:.14s}.wb:nth-child(8){animation-delay:.07s}.wb:nth-child(9){animation-delay:0s}
@keyframes wba{0%,100%{height:4px}50%{height:24px}}

/* Settings button */
.settings-btn{
  position:absolute;top:24px;right:24px;z-index:20;
  width:36px;height:36px;border-radius:50%;border:1px solid #a855f733;
  background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);
  cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.settings-btn:hover{color:var(--accent);background:rgba(168,85,247,0.12)}

/* ═══ RIGHT — CHAT PANEL ═══ */
.right{
  display:flex;flex-direction:column;
  padding:28px 22px 20px;gap:12px;
  border-left:1px solid rgba(168,85,247,0.1);
  background:var(--panel);
}

.right-header{
  font-size:0.72rem;color:var(--muted);
  letter-spacing:0.1em;text-transform:uppercase;
  border-bottom:1px solid rgba(168,85,247,0.08);
  padding-bottom:12px;
}

/* Chat messages */
.chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0;padding-right:4px}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:#a855f744;border-radius:2px}

.msg{
  max-width:90%;padding:9px 13px;
  border-radius:14px;font-size:0.86rem;line-height:1.55;
  animation:msg-in 0.25s ease;
}
@keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#4c1d95,#7c3aed);border-bottom-right-radius:3px}
.msg.ai{align-self:flex-start;background:rgba(255,255,255,0.05);border:1px solid #a855f71a;border-bottom-left-radius:3px}
.msg.thinking{align-self:flex-start;background:rgba(255,255,255,0.03);border:1px solid #a855f711}
.dots{display:flex;gap:4px;align-items:center;height:18px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:db 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1}}

/* Interim text */
.interim{font-size:0.8rem;color:var(--muted);font-style:italic;min-height:1.1em;text-align:center;padding:0 4px}

/* Controls */
.controls{display:flex;flex-direction:column;align-items:center;gap:10px}
.status-txt{font-size:0.76rem;color:var(--muted);text-align:center;min-height:1em;transition:color 0.3s}
.status-txt.listening{color:#22c55e}.status-txt.speaking{color:#f472b6}

.mic-btn{
  width:70px;height:70px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  box-shadow:0 0 20px #a855f755;
  transition:transform 0.15s,box-shadow 0.15s;
}
.mic-btn:hover{transform:scale(1.05);box-shadow:0 0 32px #a855f7aa}
.mic-btn.listening{background:linear-gradient(135deg,#16a34a,#22c55e);box-shadow:0 0 28px #22c55e88;animation:mp 0.9s ease-in-out infinite}
@keyframes mp{0%,100%{box-shadow:0 0 20px #22c55e88}50%{box-shadow:0 0 45px #22c55ecc}}
.mic-btn svg{width:28px;height:28px;color:white}

.lang-row{display:flex;background:rgba(255,255,255,0.04);border:1px solid #a855f722;border-radius:20px;overflow:hidden}
.lbtn{padding:5px 16px;border:none;background:transparent;color:var(--muted);font-size:0.77rem;cursor:pointer;transition:all 0.2s}
.lbtn.on{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white}

/* ═══ SETTINGS OVERLAY ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(14px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#100022;border:1px solid #a855f744;border-radius:22px;padding:32px 26px;width:100%;max-width:360px;text-align:center}
.card h2{font-size:1.5rem;margin-bottom:8px;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.card p{color:var(--muted);font-size:0.83rem;margin-bottom:20px;line-height:1.6}
.lang-big{display:flex;gap:8px;margin-bottom:16px}
.lbig{flex:1;padding:10px;border:1px solid #a855f733;border-radius:12px;background:transparent;color:var(--muted);font-size:0.88rem;cursor:pointer;transition:all 0.2s}
.lbig.on{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border-color:transparent}
.save-btn{width:100%;padding:12px;background:linear-gradient(135deg,#7c3aed,#ec4899);border:none;border-radius:12px;color:white;font-size:0.95rem;font-weight:700;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ═══ SETTINGS OVERLAY ═══ -->
<div class="overlay hidden" id="overlay">
  <div class="card">
    <h2>Settings</h2>
    <p>Choose language for Heart's voice responses.</p>
    <div class="lang-big">
      <button class="lbig on" id="olEn" onclick="setOLang('en')">English</button>
      <button class="lbig"    id="olHi" onclick="setOLang('hi')">हिंदी</button>
    </div>
    <button class="save-btn" onclick="saveSettings()">Save & Close</button>
  </div>
</div>

<!-- ═══ LEFT — AVATAR ═══ -->
<div class="left">

  <!-- Bokeh background dots -->
  <div class="bokeh" id="bokeh"></div>

  <!-- Name -->
  <div class="name-overlay">
    <div class="nm">Heart</div>
    <div class="sub">AI Voice Assistant</div>
  </div>

  <!-- Settings -->
  <button class="settings-btn" onclick="openSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <!-- Large Realistic Portrait SVG -->
  <svg class="avatar-svg" viewBox="0 0 500 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Skin gradients — warm Indian complexion -->
      <radialGradient id="skinBase" cx="48%" cy="38%" r="52%">
        <stop offset="0%"   stop-color="#F8D5A8"/>
        <stop offset="35%"  stop-color="#ECBA85"/>
        <stop offset="70%"  stop-color="#D4956A"/>
        <stop offset="100%" stop-color="#B87040"/>
      </radialGradient>
      <radialGradient id="skinHighlight" cx="35%" cy="28%" r="45%">
        <stop offset="0%"   stop-color="#FFF0D8" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#FFF0D8" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="skinShadowL" cx="0%" cy="50%" r="60%">
        <stop offset="0%"   stop-color="#7A4020" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#7A4020" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="skinShadowR" cx="100%" cy="50%" r="55%">
        <stop offset="0%"   stop-color="#5C2E10" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#5C2E10" stop-opacity="0"/>
      </radialGradient>

      <!-- Hair gradients -->
      <linearGradient id="hairBase" x1="20%" y1="0%" x2="80%" y2="100%">
        <stop offset="0%"   stop-color="#180430"/>
        <stop offset="40%"  stop-color="#220840"/>
        <stop offset="100%" stop-color="#0C0118"/>
      </linearGradient>
      <linearGradient id="hairSheen" x1="0%" y1="0%" x2="100%" y2="40%">
        <stop offset="0%"   stop-color="#6B21A8" stop-opacity="0"/>
        <stop offset="35%"  stop-color="#9333EA" stop-opacity="0.28"/>
        <stop offset="55%"  stop-color="#C084FC" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#6B21A8" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="hairSheen2" x1="60%" y1="0%" x2="40%" y2="100%">
        <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.12"/>
        <stop offset="50%"  stop-color="#7C3AED" stop-opacity="0.06"/>
        <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
      </linearGradient>

      <!-- Dress -->
      <linearGradient id="dressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#2D0A60"/>
        <stop offset="50%"  stop-color="#4C1D95"/>
        <stop offset="100%" stop-color="#1A0540"/>
      </linearGradient>
      <linearGradient id="dressFabric" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
      </linearGradient>

      <!-- Eye -->
      <radialGradient id="iris" cx="38%" cy="32%" r="60%">
        <stop offset="0%"   stop-color="#5B21B6"/>
        <stop offset="30%"  stop-color="#3B0764"/>
        <stop offset="70%"  stop-color="#1C0040"/>
        <stop offset="100%" stop-color="#050010"/>
      </radialGradient>
      <radialGradient id="irisRim" cx="50%" cy="50%" r="50%">
        <stop offset="80%"  stop-color="transparent"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
      </radialGradient>
      <radialGradient id="sclera" cx="45%" cy="40%" r="55%">
        <stop offset="0%"   stop-color="#F5EEE8"/>
        <stop offset="80%"  stop-color="#EDE3D8"/>
        <stop offset="100%" stop-color="#D4C4B0"/>
      </radialGradient>

      <!-- Lip gradients -->
      <linearGradient id="lipUpper" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#B84060"/>
        <stop offset="100%" stop-color="#C85070"/>
      </linearGradient>
      <linearGradient id="lipLowerG" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#D06080"/>
        <stop offset="50%"  stop-color="#C04868"/>
        <stop offset="100%" stop-color="#A83050"/>
      </linearGradient>

      <!-- Filters -->
      <filter id="softSkin" x="-5%" y="-5%" width="110%" height="110%">
        <feGaussianBlur stdDeviation="1.2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <filter id="eyeSoft">
        <feGaussianBlur stdDeviation="0.4"/>
      </filter>
      <filter id="hairSoft">
        <feGaussianBlur stdDeviation="0.8"/>
      </filter>
      <filter id="deepShadow">
        <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
      </filter>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feComposite in="SourceGraphic" in2="b" operator="over"/>
      </filter>
      <!-- Skin pore texture -->
      <filter id="pore" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="8" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
        <feComposite in="textured" in2="SourceGraphic" operator="in"/>
        <feComponentTransfer>
          <feFuncR type="linear" slope="0.98" intercept="0.02"/>
          <feFuncG type="linear" slope="0.98" intercept="0.01"/>
          <feFuncB type="linear" slope="0.97" intercept="0.01"/>
        </feComponentTransfer>
      </filter>
    </defs>

    <!-- ════ BODY — DRESS ════ -->

    <!-- ════ SHOULDERS & NECK ════ -->

    <!-- ════ HAIR — BACK LAYER ════ -->

    <ellipse cx="250" cy="270" rx="175" ry="200" fill="url(#hairBase)" filter="url(#hairSoft)"/>
    <!-- Long flowing hair — left -->
    <path d="M75 290 Q40 380 48 500 Q55 580 90 610 Q72 530 78 450 Q80 390 100 340 Q88 320 75 290 Z" fill="url(#hairBase)"/>

    <!-- Skin texture overlay -->

      C365 395 358 425 345 455 C330 485 305 502 280 508

    <!-- Highlight — forehead/nose bridge key light -->

    <!-- Shadow — left cheek -->

    <!-- Cheek blush — subtle -->

    <!-- ════ HAIR — FRONT LAYER ════ -->
    <!-- Top of hair, parting, front hairline -->
    <path d="
      M130 220
      Q140 160 170 130

      Q240 143 230 145

    " fill="url(#hairBase)"/>

    <!-- Hair sides front — natural frame -->
    <path d="M105 250 Q92 210 108 170 Q118 148 132 136 Q115 160 114 200 Q112 230 115 265 Z" fill="url(#hairBase)" filter="url(#hairSoft)"/>
    <path d="M395 250 Q408 210 392 170 Q382 148 368 136 Q385 160 386 200 Q388 230 385 265 Z" fill="url(#hairBase)" filter="url(#hairSoft)"/>

    <!-- Hair sheen highlights -->
    <path d="M170 125 Q210 108 250 105 Q290 108 330 125 Q300 118 270 116 Q260 115 250 115 Q240 115 230 116 Q200 118 170 125 Z" fill="url(#hairSheen)"/>
    <ellipse cx="200" cy="138" rx="40" ry="10" fill="url(#hairSheen2)" transform="rotate(-15 200 138)"/>

<script>
const SERVER = 'http://localhost:3131';
let lang = localStorage.getItem('heart_lang') || 'en';
let isListening = false, isSpeaking = false;
let recognition = null, finalTxt = '', history = [];
let blinkTimer = null, mouthTimer = null;

// ── Boot ──
window.addEventListener('load', () => {
  updateLangUI();
  spawnBokeh();
  blinkLoop();
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('⚠️ Open in Chrome for voice support','');
    document.getElementById('micBtn').disabled = true;
  }
  fetch(SERVER + '/chat', {method:'OPTIONS'})
    .then(() => {
      addMsg('ai', lang==='hi'
        ? 'नमस्ते! मैं Heart हूँ। माइक दबाएं और बात करें। 😊'
        : "Hi! I'm Heart. Tap the mic and start talking. 😊");
    })
    .catch(() => {
      addMsg('ai', "Heart server isn't running. In the terminal, run:\n\nnpm run heart");
      setStatus('⚠️ Server offline — run: npm run heart','');
    });
});

// ── Settings ──
function openSettings() {
  document.getElementById('olEn').classList.toggle('on', lang==='en');
  document.getElementById('olHi').classList.toggle('on', lang==='hi');
  document.getElementById('overlay').classList.remove('hidden');
}
function setOLang(l) {
  lang = l;
  document.getElementById('olEn').classList.toggle('on', l==='en');
  document.getElementById('olHi').classList.toggle('on', l==='hi');
}
function saveSettings() {
  localStorage.setItem('heart_lang', lang);
  updateLangUI();
  document.getElementById('overlay').classList.add('hidden');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('heart_lang', l);
  updateLangUI();
  if (isListening) { stopListening(); setTimeout(startListening, 300); }
}
function updateLangUI() {
  document.getElementById('lEn')?.classList.toggle('on', lang==='en');
  document.getElementById('lHi')?.classList.toggle('on', lang==='hi');
}

// ── Mic ──
function toggleMic() {
  if (isSpeaking) { stopSpeaking(); return; }
  isListening ? stopListening() : startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  finalTxt = '';
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = lang === 'hi' ? 'hi-IN' : 'en-US';

  recognition.onstart = () => {
    isListening = true;
    setState('listening');
    setStatus(lang==='hi' ? '🎙️ सुन रही हूँ...' : '🎙️ Listening…', 'listening');
    document.getElementById('waveform').classList.add('on');
  };
  recognition.onresult = e => {
    let interim = '';
    finalTxt = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTxt += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('interim').textContent = finalTxt || interim;
  };
  recognition.onerror = e => {
    if (e.error !== 'aborted') setStatus('⚠️ Mic: ' + e.error,'');
    cleanup();
  };
  recognition.onend = () => {
    if (!isListening) return;
    cleanup();
    const txt = finalTxt.trim();
    if (txt) { addMsg('user', txt); askClaude(txt); }
    else setStatus(lang==='hi' ? 'माइक दबाएं' : 'Tap mic to start talking','');
  };
  recognition.start();
}

function stopListening() { isListening = false; try { recognition?.stop(); } catch(_){} cleanup(); }

function cleanup() {
  isListening = false;
  setState('idle');
  document.getElementById('waveform').classList.remove('on');
  document.getElementById('interim').textContent = '';
}

// ── Claude ──
async function askClaude(text) {
  setStatus(lang==='hi' ? '💭 सोच रही हूँ...' : '💭 Thinking…','');
  const tid = 'th' + Date.now();
  addThinking(tid);
  history.push({ role:'user', content:text });

  const PROJECT_CONTEXT = `You are Heart — Rakesh's personal AI voice assistant AND software co-pilot for the FrontStores project.

FrontStores = multi-app, multi-tenant desktop software for Indian shop owners.
Platform: Tauri v2 (Rust + React) — Windows + Mac
Active apps: Medical Store (shopType:"medical"), Restaurant (shopType:"restaurant")
Stack: React 18 + Vite + Tailwind + Zustand + SQLite (tauri-plugin-sql)
Structure: src/modules/ (pos, products, inventory, orders, customers, khata, expenses, reports, settings, dashboard) | src/lib/db/ (all DB ops) | src-tauri/migrations/ (0001–0005) | tools/update-server.cjs | admin-app/index.html | website/index.html
DB rules: id=UUID, tenant_id on every table, soft-delete only, no DROP/DELETE, new columns → new migration file
Subscription: 30-day trial → ₹999/month → 7-day offline grace → freeze/revoke locks immediately
Multi-tenant: changes for one shopType use guard: {shopType==='medical' && <Feature/>}

When Rakesh describes a feature/bug: understand it in FrontStores context, tell him clearly which files to change and how, keep it SHORT for voice. If he says "build it" — he'll switch to Claude Code in the IDE.

Respond in the same language spoken. No bullet points, no markdown, no asterisks. Short, warm, conversational voice responses.`;

  const sys = lang === 'hi'
    ? PROJECT_CONTEXT + '\n\nHINDI: हमेशा हिंदी में जवाब दें। छोटे और बोलचाल के तरीके से।'
    : PROJECT_CONTEXT;

  try {
    const res = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: sys, messages: history.slice(-12) })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    const data  = await res.json();
    const reply = data.content[0].text;
    history.push({ role:'assistant', content:reply });
    removeThinking(tid);
    addMsg('ai', reply);
    speak(reply);
  } catch(err) {
    removeThinking(tid);
    addMsg('ai', (lang==='hi' ? 'माफ़ करें, कुछ गड़बड़ हुई: ' : 'Sorry, something went wrong: ') + err.message);
    setStatus(lang==='hi' ? 'माइक दबाएं' : 'Tap mic to start talking','');
  }
}

// ── TTS — Fixed ──
let pendingUtt = null;

function speak(text) {
  if (!window.speechSynthesis) { setState('idle'); setStatus('Tap mic',''); return; }

  // Cancel any ongoing speech
  window.speechSynthesis.cancel();
  pendingUtt = null;

  const clean = text.replace(/[*_#`•]/g, '').replace(/\n+/g,' ').trim();
  if (!clean) { setState('idle'); return; }

  // Small delay after cancel() to avoid Chrome race condition
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(clean);
    pendingUtt = utt;

    // Detect language from content
    utt.lang = /[ऀ-ॿ]/.test(clean) ? 'hi-IN' : 'en-US';
    utt.rate  = 0.92;
    utt.pitch = 1.08;
    utt.volume = 1.0;

    // Pick best available voice
    const voices = window.speechSynthesis.getVoices();
    const tl = utt.lang.split('-')[0];
    let v = voices.find(v => v.lang === utt.lang && /female|woman|zira|samantha|lekha|veena|raveena|neerja/i.test(v.name));
    if (!v) v = voices.find(v => v.lang === utt.lang);
    if (!v) v = voices.find(v => v.lang.startsWith(tl));
    if (!v && tl === 'hi') v = voices.find(v => v.lang.includes('IN'));
    if (v) utt.voice = v;

    utt.onstart = () => {
      isSpeaking = true;
      setState('speaking');
      setStatus(lang==='hi' ? '🔊 बोल रही हूँ...' : '🔊 Speaking…', 'speaking');
      startMouth();
    };
    utt.onend = () => {
      if (pendingUtt !== utt) return;
      isSpeaking = false;
      pendingUtt = null;
      setState('idle');
      stopMouth();
      setStatus(lang==='hi' ? 'माइक दबाएं' : 'Tap mic to start talking','');
    };
    utt.onerror = (e) => {
      console.warn('TTS error:', e.error);
      if (pendingUtt !== utt) return;
      isSpeaking = false;
      pendingUtt = null;
      setState('idle');
      stopMouth();
      setStatus(lang==='hi' ? 'माइक दबाएं' : 'Tap mic to start talking','');
    };

    window.speechSynthesis.speak(utt);

    // Chrome bug: speechSynthesis stops after ~15s — keep it alive
    const keepAlive = setInterval(() => {
      if (!window.speechSynthesis.speaking) { clearInterval(keepAlive); return; }
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }, 10000);

  }, 80);
}

function stopSpeaking() {
  window.speechSynthesis?.cancel();
  pendingUtt = null;
  isSpeaking = false;
  setState('idle');
  stopMouth();
}

// ── UI helpers ──
function addMsg(role, text) {
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;

}
function addThinking(id) {
  const c = document.getElementById('chat');

  d.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function removeThinking(id){document.getElementById(id)?.remove()}

function setStatus(txt,type){
  const el=document.getElementById('status');
  el.textContent=txt;
  el.className='status-txt '+(type||'');
}

function setState(s){
  document.getElementById('rings').className='avatar-rings '+ s;

  btn.className = 'mic-btn ' + (s==='listening'?'listening':'');

    icon.innerHTML='<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  } else {
    icon.innerHTML=`<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
<path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
<line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
  }
}

// ── Blink animation ──
function blinkLoop(){
  const go=()=>{
    const lL=document.getElementById('eLidL');
    const lR=document.getElementById('eLidR');
    if(lL&&lR){
      // Close
      lL.setAttribute('ry','16'); lR.setAttribute('ry','16');
      lL.setAttribute('fill','#ECBA85'); lR.setAttribute('fill','#ECBA85');
      setTimeout(()=>{
        lL.setAttribute('ry','0.1'); lR.setAttribute('ry','0.1');
      }, 100);
    }
    blinkTimer=setTimeout(go,2000+Math.random()*3500);
  };
  blinkTimer=setTimeout(go,1600);
}

// ── Lip sync ──
const LIP_C='M205 400 Q222 416 250 420 Q278 416 295 400 Q282 430 265 436 Q258 440 250 441 Q242 440 235 436 Q218 430 205 400 Z';
const LIP_O='M205 400 Q222 422 250 428 Q278 422 295 400 Q282 438 265 446 Q258 452 250 453 Q242 452 235 446 Q218 438 205 400 Z';
const LIP_M='M205 400 Q222 419 250 424 Q278 419 295 400 Q282 434 265 441 Q258 446 250 447 Q242 446 235 441 Q218 434 205 400 Z';

function startMouth(){
  const lip=document.getElementById('lipLo');
  if(!lip)return;
  const frames=[LIP_C,LIP_M,LIP_O,LIP_M,LIP_C];
  let i=0;
  const tick=()=>{
    lip.setAttribute('d',frames[i%frames.length]);
    i++;
    mouthTimer=setTimeout(tick,130+Math.random()*90);
  };
  tick();
}
function stopMouth(){
  if(mouthTimer){clearTimeout(mouthTimer);mouthTimer=null}
  document.getElementById('lipLo')?.setAttribute('d',LIP_C);
}

// ── Bokeh particles ──
function spawnBokeh(){
  const wrap=document.getElementById('bokeh');
  const cols=['#a855f7','#ec4899','#7c3aed','#c084fc','#6b21a8','#db2777'];
  for(let i=0;i<18;i++){
    const d=document.createElement('div');
    d.className='bk';
    const sz=20+Math.random()*60;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--c:${cols[i%cols.length]}`;
    wrap.appendChild(d);
  }
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.target.matches('input,textarea')){e.preventDefault();toggleMic();}
});
